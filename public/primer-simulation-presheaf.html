<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
// Fuzzy disc texture (radial Gaussian for predicate visualization)
function makeRadialGradientTex(size = 64) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const rg = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  rg.addColorStop(0, 'rgba(255,255,255,0.45)');
  rg.addColorStop(0.5, 'rgba(255,255,255,0.25)');
  rg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}
// Fuzzy band texture (vertical Gaussian + horizontal edge fade)
function makeBandGradientTex(w = 128, h = 64) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const vg = ctx.createLinearGradient(0, 0, 0, h);
  vg.addColorStop(0, 'rgba(255,255,255,0)');
  vg.addColorStop(0.3, 'rgba(255,255,255,0.35)');
  vg.addColorStop(0.5, 'rgba(255,255,255,0.35)');
  vg.addColorStop(0.7, 'rgba(255,255,255,0.35)');
  vg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = 'destination-in';
  const hg = ctx.createLinearGradient(0, 0, w, 0);
  hg.addColorStop(0, 'rgba(255,255,255,0)');
  hg.addColorStop(0.15, 'rgba(255,255,255,1)');
  hg.addColorStop(0.85, 'rgba(255,255,255,1)');
  hg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = 'source-over';
  return new THREE.CanvasTexture(c);
}

// ═══════════════════════════════════════════════════════════════
// SCENE SETUP
// ═══════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });

// Ambient particles

for (let i = 0; i < 300 * 3; i++) starPos[i] = (Math.random() - 0.5) * 60;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function makeTube(points, radius, color, opacity = 1) {
  const curve = new THREE.CatmullRomCurve3(points);
  const geo = new THREE.TubeGeometry(curve, Math.max(points.length * 4, 64), radius, 8, false);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
  return new THREE.Mesh(geo, mat);
}

function makeLine(points, color, opacity = 1) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
  return new THREE.Line(geo, mat);
}

function makeDashedLine(points, color, dashSize = 0.3, gapSize = 0.15) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineDashedMaterial({ color, dashSize, gapSize, transparent: true, opacity: 0.7 });
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  return line;
}

function makeSphere(pos, radius, color) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 16, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  m.position.copy(pos);
  return m;
}

function makeFilledRegion(shapePts, color, opacity = 0.15) {
  const shape = new THREE.Shape();
  shape.moveTo(shapePts[0].x, shapePts[0].y);
  for (let i = 1; i < shapePts.length; i++) shape.lineTo(shapePts[i].x, shapePts[i].y);
  shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide });
  return new THREE.Mesh(geo, mat);
}

function makeLabel(text, position, color = '#1f2328', size = 1.45) {
  const canvas = document.createElement('canvas');
  // Measure text to size canvas appropriately
  const tempCtx = canvas.getContext('2d');
  tempCtx.font = 'bold 48px Georgia';
  const measured = tempCtx.measureText(text);
  const textWidth = Math.ceil(measured.width) + 40;
  canvas.width = Math.max(256, textWidth);
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 48px Georgia';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, 64);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const s = new THREE.Sprite(mat);
  s.position.copy(position);
  const aspect = canvas.width / canvas.height;
  s.scale.set(size * aspect, size, 1);
  return s;
}

function makeWall(x, height, color = 0xf85149, opacity = 0.35) {
  const geo = new THREE.PlaneGeometry(0.06, height);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, height / 2, 0);
  return m;
}

function sampleCurve(fn, xMin, xMax, steps = 120) {
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (xMax - xMin) * i / steps;
    pts.push(new THREE.Vector3(x, fn(x), 0));
  }
  return pts;
}

function smoothstep(t) { return t * t * (3 - 2 * t); }

// Animated dashed curve: custom ShaderMaterial for reliable marching-ants animation
function makeAnimatedDash(fn, xMin, xMax, color, opacity = 0.85, dashSize = 0.4, gapSize = 0.25) {
  const pts = sampleCurve(fn, xMin, xMax, 200);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  // Compute cumulative line distances as attribute
  const distances = new Float32Array(pts.length);
  distances[0] = 0;
  for (let i = 1; i < pts.length; i++) {
    distances[i] = distances[i - 1] + pts[i].distanceTo(pts[i - 1]);
  }
  geo.setAttribute('lineDistance', new THREE.BufferAttribute(distances, 1));
  const c = new THREE.Color(color);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    uniforms: {
      uColor: { value: c },
      uOpacity: { value: opacity },
      uDashSize: { value: dashSize },
      uGapSize: { value: gapSize },
      uOffset: { value: 0 },
    },
    vertexShader: `
      attribute float lineDistance;
      varying float vDist;
      void main() {
        vDist = lineDistance;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      uniform float uOpacity;
      uniform float uDashSize;
      uniform float uGapSize;
      uniform float uOffset;
      varying float vDist;
      void main() {
        float d = mod(vDist + uOffset, uDashSize + uGapSize);
        if (d > uDashSize) discard;
        gl_FragColor = vec4(uColor, uOpacity);
      }
    `,
  });
  return new THREE.Line(geo, mat);
}
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function makeArrow(origin, dir, length, color, shaftR = 0.02, headLen = 0.15, headR = 0.06) {
  const group = new THREE.Group();
  // Shaft
  const shaftLen = length - headLen;
  const shaftGeo = new THREE.CylinderGeometry(shaftR, shaftR, shaftLen, 8);
  const mat = new THREE.MeshBasicMaterial({ color });
  const shaft = new THREE.Mesh(shaftGeo, mat);
  shaft.position.y = shaftLen / 2;
  group.add(shaft);
  // Head
  const headGeo = new THREE.ConeGeometry(headR, headLen, 8);
  const head = new THREE.Mesh(headGeo, mat);
  head.position.y = shaftLen + headLen / 2;
  group.add(head);
  // Orient from +Y to dir
  const up = new THREE.Vector3(0, 1, 0);
  const d = dir.clone().normalize();
  const q = new THREE.Quaternion().setFromUnitVectors(up, d);
  group.quaternion.copy(q);
  group.position.copy(origin);
  return group;
}

// 3D cloud for plane-based stages
function makeCloud3D(g, count, opts = {}) {
  const xRange = opts.xRange || 12;
  const zRange = opts.zRange || 12;
  const yMin = opts.yMin || 1.5;
  const yMax = opts.yMax || 5;
  const xOff = opts.xOffset || 0;
  const zOff = opts.zOffset || 0;
  const radius = opts.radius || 0.09;

  const sphereGeo = new THREE.SphereGeometry(radius, 8, 6);
  const instancedMesh = new THREE.InstancedMesh(
    sphereGeo,
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    count
  );
  instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(count * 3), 3);
  g.add(instancedMesh);

  const dotData = new Array(count);
  const tmpMatrix = new THREE.Matrix4();
  const tmpColor = new THREE.Color();

  for (let i = 0; i < count; i++) {
    const curX = xOff + (rng(i * 37 + 13) - 0.5) * xRange;
    const curZ = zOff + (rng(i * 41 + 17) - 0.5) * zRange;
    const curY = yMin + rng(i * 59 + 23) * (yMax - yMin);
    const phase = rng(i * 67 + 29) * Math.PI * 2;
    const ampY = 0.15 + rng(i * 71 + 31) * 0.3;
    const ci = Math.floor(rng(i * 11 + 7) * FIBER_COLORS.length);

    dotData[i] = {
      curX, curY, curZ, baseY: curY, baseX: curX, baseZ: curZ,
      phase, ampY, color: FIBER_COLORS[ci], scale: 1
    };

    tmpMatrix.makeTranslation(curX, curY, curZ);
    instancedMesh.setMatrixAt(i, tmpMatrix);
    tmpColor.set(FIBER_COLORS[ci]);
    instancedMesh.instanceColor.setXYZ(i, tmpColor.r, tmpColor.g, tmpColor.b);
  }
  instancedMesh.instanceMatrix.needsUpdate = true;
  instancedMesh.instanceColor.needsUpdate = true;

  return { instancedMesh, dotData, count, tmpMatrix: new THREE.Matrix4() };
}

function updateCloud3D(cloud, t) {
  const mat = cloud.tmpMatrix;
  for (let i = 0; i < cloud.count; i++) {
    const dd = cloud.dotData[i];
    const targetY = dd.baseY + Math.sin(t * 1.2 + dd.phase) * dd.ampY;
    dd.curY = lerp(dd.curY, targetY, 0.07);
    const s = dd.scale;
    mat.makeScale(s, s, s);
    mat.setPosition(dd.curX, dd.curY, dd.curZ);
    cloud.instancedMesh.setMatrixAt(i, mat);
  }
  cloud.instancedMesh.instanceMatrix.needsUpdate = true;
}

function makeCollapsibleGrid(g, size, divisions, color = 0xc0c8d0, opacity = 0.3) {
  const half = size / 2;
  const step = size / divisions;
  const xLines = [];
  const zLines = [];

  for (let i = 0; i <= divisions; i++) {
    const z = -half + i * step;
    const line = makeLine([
      new THREE.Vector3(-half, 0, z),
      new THREE.Vector3(half, 0, z)
    ], color, opacity);
    g.add(line);
    xLines.push({ line, originalZ: z });
  }

  for (let i = 0; i <= divisions; i++) {
    const x = -half + i * step;
    const line = makeLine([
      new THREE.Vector3(x, 0, -half),
      new THREE.Vector3(x, 0, half)
    ], color, opacity);
    g.add(line);
    zLines.push({ line, originalX: x });
  }

  return { xLines, zLines };
}

// ═══════════════════════════════════════════════════════════════
// CURVE FUNCTIONS
// ═══════════════════════════════════════════════════════════════
const dinnerPrice = x => 2.2 + 0.5 * Math.sin(x * 0.55) + 0.25 * Math.cos(x * 1.1) + 0.15 * Math.sin(x * 1.8);
const BUDGET = 2.8;

const cc1Fn = x => 1.8 + 0.3 * Math.sin(x * 0.7);
const cc2Fn = x => 3.3 + 0.2 * Math.cos(x * 0.8);
const cc3Fn = x => 2.1 + 0.25 * Math.sin(x * 0.6 + 1);

const CC_BOUNDS = [[-8, -2], [-2, 3], [3, 8]];
const CC_COLORS = [0x58a6ff, 0x3fb950, 0xbc8cff];
const CC_FNS = [cc1Fn, cc2Fn, cc3Fn];


// ═══════════════════════════════════════════════════════════════
// SHARED CONSTANTS & CLOUD HELPERS
// ═══════════════════════════════════════════════════════════════
const FIBER_COLORS = [0xf85149, 0xffa657, 0x7ee787, 0x58a6ff, 0xbc8cff, 0x57606a];
const FIBER_NAMES = ['bread', 'iron', 'cloth', 'labor', 'tools', 'grain'];
const FIBER_POSITIONS = [-6, -3, 0, 3, 6];
const rng = n => Math.sin(n * 127.1 + 311.7) * 0.5 + 0.5;

function makeBaseLine(g, opacity = 1) {
  g.add(makeTube([new THREE.Vector3(-8, 0, 0), new THREE.Vector3(8, 0, 0)], 0.04, 0x58a6ff, opacity));
}

function makeYAxis(g, opacity = 1) {
  g.add(makeTube([new THREE.Vector3(-8.5, 0, 0), new THREE.Vector3(-8.5, 5, 0)], 0.025, 0xafb8c1, opacity));
  g.add(makeLabel('magnitude', new THREE.Vector3(-8.5, 5.6, 0), '#57606a', 0.8));
}

// Creates an InstancedMesh cloud of dots. Returns { instancedMesh, dotData, TOTAL_DOTS, tmpMatrix }.
// fiberXs: array of x positions for fibers (or single-element for one fiber)
// dotsPerFiber: dots per fiber
// opts: { radius, spread, yRange, showFiberLines, fiberLineOpacity }
function makeCloud(g, fiberXs, dotsPerFiber, opts = {}) {
  const radius = opts.radius || 0.09;
  const spread = opts.spread || 0.8;
  const yMin = opts.yMin || 0.4;
  const yRange = opts.yRange || 4.2;
  const showFiberLines = opts.showFiberLines !== false;
  const fiberLineOpacity = opts.fiberLineOpacity || 0.4;
  const fiberLineHeight = opts.fiberLineHeight || 5.5;

  const TOTAL_DOTS = fiberXs.length * dotsPerFiber;
  const sphereGeo = new THREE.SphereGeometry(radius, 8, 6);
  const instancedMesh = new THREE.InstancedMesh(
    sphereGeo,
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    TOTAL_DOTS
  );
  instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(TOTAL_DOTS * 3), 3);
  g.add(instancedMesh);

  const dotData = new Array(TOTAL_DOTS);
  const fibers = {};
  const fiberLines = [];
  const tmpMatrix = new THREE.Matrix4();
  const tmpColor = new THREE.Color();
  let idx = 0;

  for (const fx of fiberXs) {
    fibers[fx] = [];
    if (showFiberLines) {
      const fl = makeLine([new THREE.Vector3(fx, 0, 0), new THREE.Vector3(fx, fiberLineHeight, 0)], 0xc0c8d0, fiberLineOpacity);
      g.add(fl);
      fiberLines.push(fl);
    }
    for (let i = 0; i < dotsPerFiber; i++) {
      const baseY = yMin + rng(fx * 13 + i * 37) * yRange;
      const ci = Math.floor(rng(fx * 11 + i * 23) * FIBER_COLORS.length);
      const ni = Math.floor(rng(fx * 29 + i * 31) * FIBER_NAMES.length);
      const phase = rng(fx * 17 + i * 41) * Math.PI * 2;
      const ampY = 0.15 + rng(fx * 19 + i * 43) * 0.4;
      const ampX = 0.08 + rng(fx * 23 + i * 47) * 0.25;
      const baseX = fx + (rng(fx * 31 + i * 53) - 0.5) * spread;

      dotData[idx] = {
        baseY, baseX, fiberX: fx, phase, ampY, ampX,
        name: FIBER_NAMES[ni], color: FIBER_COLORS[ci],
        orderedY: 0, curX: baseX, curY: baseY, scale: 1,
      };
      fibers[fx].push(idx);

      tmpMatrix.makeTranslation(baseX, baseY, 0);
      instancedMesh.setMatrixAt(idx, tmpMatrix);
      tmpColor.set(FIBER_COLORS[ci]);
      instancedMesh.instanceColor.setXYZ(idx, tmpColor.r, tmpColor.g, tmpColor.b);
      idx++;
    }
  }
  instancedMesh.instanceMatrix.needsUpdate = true;
  instancedMesh.instanceColor.needsUpdate = true;

  return { instancedMesh, dotData, fibers, fiberLines, TOTAL_DOTS, tmpMatrix: new THREE.Matrix4() };
}

// Animate a cloud: wobble dots freely or snap to ordered positions if fixated
function updateCloud(cloud, t, fixated = false) {
  const mat = cloud.tmpMatrix;
  for (let i = 0; i < cloud.TOTAL_DOTS; i++) {
    const dd = cloud.dotData[i];
    if (fixated) {
      dd.curY = lerp(dd.curY, dd.orderedY, 0.07);
      dd.curX = lerp(dd.curX, dd.fiberX, 0.07);
    } else {
      const targetY = dd.baseY + Math.sin(t * 1.2 + dd.phase) * dd.ampY;
      const targetX = dd.baseX + Math.sin(t * 0.8 + dd.phase * 1.3) * dd.ampX;
      dd.curY = lerp(dd.curY, targetY, 0.07);
      dd.curX = lerp(dd.curX, targetX, 0.07);
    }
    const s = dd.scale;
    mat.makeScale(s, s, s);
    mat.setPosition(dd.curX, dd.curY, 0);
    cloud.instancedMesh.setMatrixAt(i, mat);
  }
  cloud.instancedMesh.instanceMatrix.needsUpdate = true;
}

// Shaded region helper (for sections/budget stages)
function flushSegment(g, xs) {
  if (xs.length < 3) return;
  const pts = [];
  for (const x of xs) pts.push(new THREE.Vector2(x, dinnerPrice(x)));
  pts.push(new THREE.Vector2(xs[xs.length - 1], BUDGET));
  pts.push(new THREE.Vector2(xs[0], BUDGET));
  g.add(makeFilledRegion(pts, 0x7ee787, 0.12));
}


// ═══════════════════════════════════════════════════════════════
// STAGE DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const stageGroup = new THREE.Group();
scene.add(stageGroup);

const STAGES = [
  // ─── STAGE 0: THE EVALUATION FUNCTION (PLANE) ───
  {
    id: 'eval-plane',
    title: 'The Evaluation Function',
    text: `Everything begins with the <em>locale of value conditions</em> <span class="math">T</span> — the plane below (§10). Above it floats a cloud of <em>useful things</em> <span class="math">𝒟</span>: bread, iron, cloth, labor-power. The <em>evaluation function</em> <span class="math">e : 𝒟 × 𝒟 → T</span> returns the degree to which one thing relates to another (§2.4.2). <strong>Click two dots</strong> to see which region of <span class="math">T</span> lights up — the value conditions under which that pair is exchangeable. Click again to reset.`,
    cam: { pos: [10, 8, 10], target: [0, 1.5, 0] },
    stageData: {},
    setup(g) {
      const grid = makeCollapsibleGrid(g, 16, 16);

      // Faint solid plane underneath
      const planeGeo = new THREE.PlaneGeometry(16, 16);
      const planeMat = new THREE.MeshBasicMaterial({ color: 0xeceff3, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -0.01;
      g.add(plane);

      // Dot cloud in 3D
      const cloud = makeCloud3D(g, 80, { xRange: 12, zRange: 12, yMin: 1.5, yMax: 5 });

      // Cell grid: 16x16 quads at y=0.01
      const cellGeo = new THREE.PlaneGeometry(0.95, 0.95);
      const cells = [];
      for (let r = 0; r < 16; r++) {
        for (let c = 0; c < 16; c++) {
          const mat = new THREE.MeshBasicMaterial({ color: 0x58a6ff, transparent: true, opacity: 0, side: THREE.DoubleSide });
          const cell = new THREE.Mesh(cellGeo, mat);
          cell.rotation.x = -Math.PI / 2;
          cell.position.set(-7.5 + c, 0.01, -7.5 + r);
          g.add(cell);
          cells.push(cell);
        }
      }

      // Labels
      g.add(makeLabel('D — useful things', new THREE.Vector3(0, 5.5, 0), '#57606a', 0.8));
      g.add(makeLabel('e : D \u00d7 D \u2192 T', new THREE.Vector3(0, -1.5, 0), '#8250df', 0.8));
      g.add(makeLabel('T — value conditions', new THREE.Vector3(8.5, 0, 0), '#57606a', 0.6));
      const stateLabel = makeLabel('click two dots to evaluate', new THREE.Vector3(0, -2.5, 0), '#57606a', 0.55);
      g.add(stateLabel);

      // Click interaction: 3-state machine
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let clickState = 'idle';
      let firstIdx = -1, secondIdx = -1;
      let vLine1 = null, vLine2 = null;

      const onClick = (event) => {
        if (STAGES[currentStage]?.id !== 'eval-plane') return;
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        if (clickState === 'pair') {
          // Third click: reset
          clickState = 'idle';
          cloud.dotData[firstIdx].scale = 1;
          cloud.dotData[secondIdx].scale = 1;
          if (vLine1) { g.remove(vLine1); vLine1 = null; }
          if (vLine2) { g.remove(vLine2); vLine2 = null; }
          for (const cell of cells) cell.material.opacity = 0;
          const ns = makeLabel('click two dots to evaluate', stateLabel.position.clone(), '#57606a', 0.55);
          stateLabel.material = ns.material;
          stateLabel.scale.copy(ns.scale);
          return;
        }

        const hits = raycaster.intersectObject(cloud.instancedMesh);
        if (hits.length === 0) return;
        const hitIdx = hits[0].instanceId;

        if (clickState === 'idle') {
          clickState = 'first';
          firstIdx = hitIdx;
          cloud.dotData[hitIdx].scale = 1.8;
          const dd = cloud.dotData[hitIdx];
          vLine1 = makeDashedLine([
            new THREE.Vector3(dd.curX, dd.curY, dd.curZ),
            new THREE.Vector3(dd.curX, 0, dd.curZ)
          ], 0x58a6ff);
          g.add(vLine1);
          const ns = makeLabel('click a second dot', stateLabel.position.clone(), '#1a7f37', 0.55);
          stateLabel.material = ns.material;
          stateLabel.scale.copy(ns.scale);
        } else if (clickState === 'first') {
          if (hitIdx === firstIdx) return;
          clickState = 'pair';
          secondIdx = hitIdx;
          cloud.dotData[hitIdx].scale = 1.8;
          const dd = cloud.dotData[hitIdx];
          vLine2 = makeDashedLine([
            new THREE.Vector3(dd.curX, dd.curY, dd.curZ),
            new THREE.Vector3(dd.curX, 0, dd.curZ)
          ], 0x58a6ff);
          g.add(vLine2);

          // Light up cells around midpoint of the two dots' XZ positions
          const d1 = cloud.dotData[firstIdx];
          const d2 = cloud.dotData[secondIdx];
          const midX = (d1.curX + d2.curX) / 2;
          const midZ = (d1.curZ + d2.curZ) / 2;
          const hash = Math.abs(Math.sin(firstIdx * 127.1 + secondIdx * 311.7));
          const rad = 2 + hash * 5;
          for (let r = 0; r < 16; r++) {
            for (let c = 0; c < 16; c++) {
              const cx = -7.5 + c;
              const cz = -7.5 + r;
              const dist = Math.sqrt((cx - midX) ** 2 + (cz - midZ) ** 2);
              if (dist < rad) {
                cells[r * 16 + c].material.opacity = (1 - dist / rad) * 0.4;
              }
            }
          }

          const ns = makeLabel('e(d\u2081,d\u2082) \u2208 T — click to reset', stateLabel.position.clone(), '#8250df', 0.55);
          stateLabel.material = ns.material;
          stateLabel.scale.copy(ns.scale);
        }
      };
      renderer.domElement.addEventListener('click', onClick);

      this.stageData = { cloud, onClick };
    },
    update(t) {
      if (this.stageData.cloud) updateCloud3D(this.stageData.cloud, t);
    },
    teardown() {
      if (this.stageData.onClick) renderer.domElement.removeEventListener('click', this.stageData.onClick);
    }
  },

  // ─── STAGE 1: A SINGLE FIBER ───
  {
    id: 'single-fiber',
    title: 'A Single Fiber',
    text: `Pick one point in the <em>locale of value conditions</em> <span class="math">T</span>. Above it rises a <em>stalk</em> — the elements of <span class="math">𝒟</span> evaluated at this condition. Each evaluation function (<span class="math">e₁, e₂, e₃</span>) may assign a different magnitude to the same useful thing at this point, so the dots spread vertically: the spread <em>is</em> the disagreement between evaluators. If all evaluators agreed, the stalk would collapse to a single height — that would be <em>kernel-coherence</em> (§5.3.3).<br><br><strong>Click a dot</strong> to fix it as a <em>standard</em> — the fuzzy disc is the predicate <span class="math">e<sub>b</sub></span> it generates (§2.6.1), assigning a degree to every other element. <strong>Click a second dot</strong> to produce a second predicate — two local evaluations that will become sections.`,
    cam: { pos: [6, 5, 8], target: [0, 2.5, 0] },
    stageData: {},
    setup(g) {
      makeCollapsibleGrid(g, 16, 32, 0xd0d8e0, 0.2);

      // Faint plane
      const planeGeo = new THREE.PlaneGeometry(16, 16);
      const planeMat = new THREE.MeshBasicMaterial({ color: 0xeceff3, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -0.01;
      g.add(plane);

      // Highlighted base point
      g.add(makeSphere(new THREE.Vector3(0, 0, 0), 0.15, 0x0969da));

      // Color splash around base point
      const splashGeo = new THREE.PlaneGeometry(0.48, 0.48);
      for (let r = -4; r <= 4; r++) {
        for (let c = -4; c <= 4; c++) {
          const cx = c * 0.5, cz = r * 0.5;
          const dist = Math.sqrt(cx * cx + cz * cz);
          if (dist > 2) continue;
          const opacity = (1 - dist / 2) * 0.25;
          const mat = new THREE.MeshBasicMaterial({
            color: 0x0969da, transparent: true, opacity, side: THREE.DoubleSide
          });
          const cell = new THREE.Mesh(splashGeo, mat);
          cell.rotation.x = -Math.PI / 2;
          cell.position.set(cx, 0.01, cz);
          g.add(cell);
        }
      }

      // Vertical tube
      g.add(makeTube([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 5.5, 0)], 0.03, 0x58a6ff, 0.5));

      // Cloud clustered above origin
      const cloud = makeCloud3D(g, 60, { xRange: 1.2, zRange: 1.2, yMin: 0.5, yMax: 5 });

      // Evaluator lines — three dashed lines at different heights showing e₁, e₂, e₃
      const evalColors = [0x3fb950, 0xffa657, 0xbc8cff];
      const evalYs = [1.5, 3.0, 4.2];
      const evalNames = ['e₁', 'e₂', 'e₃'];
      const evalLabelColors = ['#3fb950', '#ffa657', '#bc8cff'];
      const evaluatorLines = [];
      const evaluatorLabels = [];
      for (let i = 0; i < 3; i++) {
        const pts = [new THREE.Vector3(-0.8, evalYs[i], 0), new THREE.Vector3(0.8, evalYs[i], 0)];
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        const mat = new THREE.LineDashedMaterial({
          color: evalColors[i], dashSize: 0.15, gapSize: 0.1,
          transparent: true, opacity: 0.4
        });
        const line = new THREE.Line(geo, mat);
        line.computeLineDistances();
        g.add(line);
        evaluatorLines.push(line);
        const lbl = makeLabel(evalNames[i], new THREE.Vector3(1.0, evalYs[i], 0), evalLabelColors[i], 0.4);
        lbl.material.opacity = 0.6;
        g.add(lbl);
        evaluatorLabels.push(lbl);
      }

      // Labels
      g.add(makeLabel('T — value space', new THREE.Vector3(3, -0.3, 3), '#57606a', 0.6));
      g.add(makeLabel('stalk Eₜ', new THREE.Vector3(1.5, 3, 0), '#0969da', 0.6));

      // Two predicate discs (hidden initially)
      const DISC_RADIUS = 2.5;
      const discGeo = new THREE.CircleGeometry(DISC_RADIUS, 64);
      const discTex = makeRadialGradientTex();
      const disc1Mat = new THREE.MeshBasicMaterial({
        map: discTex, color: 0xf85149,
        transparent: true, side: THREE.DoubleSide, depthWrite: false,
      });
      const disc2Mat = new THREE.MeshBasicMaterial({
        map: discTex, color: 0x58a6ff,
        transparent: true, side: THREE.DoubleSide, depthWrite: false,
      });
      const disc1 = new THREE.Mesh(discGeo, disc1Mat);
      const disc2 = new THREE.Mesh(discGeo, disc2Mat);
      disc1.rotation.x = -Math.PI / 2;
      disc2.rotation.x = -Math.PI / 2;
      disc1.scale.set(0, 0, 0);
      disc2.scale.set(0, 0, 0);
      g.add(disc1);
      g.add(disc2);

      // Click handler: idle → one → two → idle
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let clickState = 'idle'; // 'idle' | 'one' | 'two'
      let disc1Target = 0, disc2Target = 0;
      let hit1Idx = -1, hit2Idx = -1;

      const predLabel = makeLabel('click a dot to see its predicate eᵦ', new THREE.Vector3(0, -1.5, 0), '#57606a', 0.5);
      g.add(predLabel);

      function updatePredLabel(text, color) {
        const ns = makeLabel(text, predLabel.position.clone(), color, 0.5);
        predLabel.material = ns.material;
        predLabel.scale.copy(ns.scale);
      }

      function resetDots() {
        for (let i = 0; i < cloud.count; i++) {
          cloud.dotData[i].scale = 1;
          cloud.dotData[i].predicateX = null;
          cloud.dotData[i].predicateY = null;
          cloud.dotData[i].predicateZ = null;
        }
      }

      function projectOntoDisc(hitIdx, discMesh) {
        const dd = cloud.dotData[hitIdx];
        dd.scale = 0; // hide the clicked dot
        return dd;
      }

      function assignDotsToOneDisc(hitIdx) {
        const dd = cloud.dotData[hitIdx];
        for (let i = 0; i < cloud.count; i++) {
          if (i === hitIdx) continue;
          const degree = rng(hitIdx * 137 + i * 59);
          const dist = (1 - degree) * DISC_RADIUS * 0.9;
          const angle = rng(i * 83 + hitIdx * 29) * Math.PI * 2;
          cloud.dotData[i].predicateX = dd.curX + dist * Math.cos(angle);
          cloud.dotData[i].predicateY = dd.curY;
          cloud.dotData[i].predicateZ = dd.curZ + dist * Math.sin(angle);
        }
      }

      function assignDotsToTwoDiscs(idx1, idx2) {
        const dd1 = cloud.dotData[idx1];
        const dd2 = cloud.dotData[idx2];
        for (let i = 0; i < cloud.count; i++) {
          if (i === idx1 || i === idx2) continue;
          const deg1 = rng(idx1 * 137 + i * 59);
          const deg2 = rng(idx2 * 137 + i * 59);
          // Assign to whichever predicate gives higher degree
          if (deg1 >= deg2) {
            const dist = (1 - deg1) * DISC_RADIUS * 0.9;
            const angle = rng(i * 83 + idx1 * 29) * Math.PI * 2;
            cloud.dotData[i].predicateX = dd1.curX + dist * Math.cos(angle);
            cloud.dotData[i].predicateY = dd1.curY;
            cloud.dotData[i].predicateZ = dd1.curZ + dist * Math.sin(angle);
          } else {
            const dist = (1 - deg2) * DISC_RADIUS * 0.9;
            const angle = rng(i * 83 + idx2 * 29) * Math.PI * 2;
            cloud.dotData[i].predicateX = dd2.curX + dist * Math.cos(angle);
            cloud.dotData[i].predicateY = dd2.curY;
            cloud.dotData[i].predicateZ = dd2.curZ + dist * Math.sin(angle);
          }
        }
      }

      const onClick = (event) => {
        if (STAGES[currentStage]?.id !== 'single-fiber') return;
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        if (clickState === 'two') {
          // Third click: reset everything
          clickState = 'idle';
          disc1Target = 0;
          disc2Target = 0;
          hit1Idx = -1;
          hit2Idx = -1;
          resetDots();
          updatePredLabel('click a dot to see its predicate eᵦ', '#57606a');
          return;
        }

        const hits = raycaster.intersectObject(cloud.instancedMesh);
        if (hits.length === 0) return;
        const hitIdx = hits[0].instanceId;

        if (clickState === 'idle') {
          clickState = 'one';
          hit1Idx = hitIdx;
          disc1Target = 1;
          const dd = cloud.dotData[hitIdx];
          disc1.position.set(dd.curX, dd.curY, dd.curZ);
          disc1Mat.color.set(dd.color);
          projectOntoDisc(hitIdx, disc1);
          assignDotsToOneDisc(hitIdx);
          updatePredLabel('eᵦ₁ — click a second dot', '#8250df');
        } else if (clickState === 'one') {
          if (hitIdx === hit1Idx) return; // same dot, ignore
          clickState = 'two';
          hit2Idx = hitIdx;
          disc2Target = 1;
          const dd = cloud.dotData[hitIdx];
          disc2.position.set(dd.curX, dd.curY, dd.curZ);
          disc2Mat.color.set(dd.color);
          projectOntoDisc(hitIdx, disc2);
          assignDotsToTwoDiscs(hit1Idx, hit2Idx);
          updatePredLabel('eᵦ₁ , eᵦ₂ — two predicates (click to reset)', '#8250df');
        }
      };
      renderer.domElement.addEventListener('click', onClick);

      this.stageData = {
        cloud, disc1, disc2, evaluatorLines, evaluatorLabels,
        clickState: () => clickState,
        disc1Target: () => disc1Target,
        disc2Target: () => disc2Target,
        onClick,
      };
    },
    update(t) {
      const d = this.stageData;
      if (!d.cloud) return;
      const cloud = d.cloud;
      const state = d.clickState();
      const active = state !== 'idle';
      const mat = cloud.tmpMatrix;

      for (let i = 0; i < cloud.count; i++) {
        const dd = cloud.dotData[i];
        if (active && dd.predicateY != null) {
          dd.curX = lerp(dd.curX, dd.predicateX, 0.07);
          dd.curY = lerp(dd.curY, dd.predicateY, 0.07);
          dd.curZ = lerp(dd.curZ, dd.predicateZ, 0.07);
        } else {
          const targetY = dd.baseY + Math.sin(t * 1.2 + dd.phase) * dd.ampY;
          dd.curX = lerp(dd.curX, dd.baseX, 0.07);
          dd.curY = lerp(dd.curY, targetY, 0.07);
          dd.curZ = lerp(dd.curZ, dd.baseZ, 0.07);
        }
        const s = dd.scale;
        mat.makeScale(s, s, s);
        mat.setPosition(dd.curX, dd.curY, dd.curZ);
        cloud.instancedMesh.setMatrixAt(i, mat);
      }
      cloud.instancedMesh.instanceMatrix.needsUpdate = true;

      // Lerp disc scales
      const s1 = lerp(d.disc1.scale.x, d.disc1Target(), 0.08);
      d.disc1.scale.set(s1, s1, s1);
      const s2 = lerp(d.disc2.scale.x, d.disc2Target(), 0.08);
      d.disc2.scale.set(s2, s2, s2);

      // Evaluator line dimming
      const evalTgt = active ? 0.05 : 0.4;
      for (const el of d.evaluatorLines) {
        el.material.opacity = lerp(el.material.opacity, evalTgt, 0.06);
      }
      const lblTgt = active ? 0.1 : 0.6;
      for (const el of d.evaluatorLabels) {
        el.material.opacity = lerp(el.material.opacity, lblTgt, 0.06);
      }
    },
    teardown() {
      if (this.stageData.onClick) renderer.domElement.removeEventListener('click', this.stageData.onClick);
    }
  },

  // ─── STAGE 1b: PREDICATES BECOME SECTIONS ───
  {
    id: 'disc-to-section',
    title: 'From Predicates to Sections',
    text: `Each predicate <span class="math">e<sub>b</sub> : \u{1D4D3} \u2192 T</span> is a <em>local evaluation</em> \u2014 it assigns a degree to every element from the standpoint of <span class="math">b</span>. A <em>section</em> <span class="math">s \u2208 \u2130(U)</span> over a region of <span class="math">T</span> is exactly this: a local evaluation valid under those conditions (\u00A710.6). Watch the two predicate discs spread across the value space, stretch to cover regions <span class="math">U\u2081</span> and <span class="math">U\u2082</span>, and develop the height variation of section surfaces. Where the regions overlap, the sections meet \u2014 the <em>gluing condition</em> emerges from the predicate structure itself.`,
    cam: { pos: [6, 5, 8], target: [0, 2.5, 0] },
    stageData: {},
    setup(g) {
      // Faint ground plane + grid
      makeCollapsibleGrid(g, 16, 16, 0xd0d8e0, 0.2);
      const planeGeo = new THREE.PlaneGeometry(16, 16);
      const planeMat = new THREE.MeshBasicMaterial({ color: 0xeceff3, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -0.01;
      g.add(plane);

      // Base point (fades out during transition)
      const basePoint = makeSphere(new THREE.Vector3(0, 0, 0), 0.15, 0x0969da);
      g.add(basePoint);

      // Section height functions (same as gluing-fibers stage)
      const secFn = (x, z) => 2.8 + 0.5 * Math.sin(x * 0.5 + 0.3) + 0.35 * Math.cos(z * 0.55 + 0.5)
                                   + 0.25 * Math.sin(x * 1.1 + z * 0.8) + 0.15 * Math.cos(x * 0.3 - z * 0.65);
      const sec2Fn = (x, z) => {
        if (x <= 1) return secFn(x, z);
        const edge = secFn(1, z);
        const tt = x - 1;
        return edge + 0.45 * Math.sin(tt * 0.7) + 0.25 * Math.cos(z * 0.55 + tt * 0.9) + 0.15 * Math.sin(tt * 1.4 + z * 0.4);
      };

      // Region definitions
      const u1 = { x1: -6, x2: 1, z1: -3, z2: 3 };
      const u2 = { x1: -1, x2: 6, z1: -2, z2: 4 };

      // ── Two morphing surfaces ──
      // Start as small discs at origin, morph into rectangular section surfaces.
      const SEGS = 40;

      function makeMorphSurface(region, fn, color) {
        const geo = new THREE.PlaneGeometry(1, 1, SEGS, SEGS);
        geo.rotateX(-Math.PI / 2);
        const pos = geo.attributes.position.array;
        const count = pos.length / 3;

        const initPositions = new Float32Array(pos.length);
        const finalPositions = new Float32Array(pos.length);

        const cx = (region.x1 + region.x2) / 2;
        const cz = (region.z1 + region.z2) / 2;
        const hw = (region.x2 - region.x1) / 2;
        const hd = (region.z2 - region.z1) / 2;

        for (let i = 0; i < count; i++) {
          const ux = pos[i * 3];
          const uz = pos[i * 3 + 2];

          // Disc form: small circle at origin
          const discR = 1.2;
          const angle = Math.atan2(uz, ux);
          const unitR = Math.sqrt(ux * ux + uz * uz) * 2;
          const dr = unitR * discR;
          initPositions[i * 3]     = dr * Math.cos(angle);
          initPositions[i * 3 + 1] = 2.8;
          initPositions[i * 3 + 2] = dr * Math.sin(angle);

          // Section surface form
          const wx = cx + ux * 2 * hw;
          const wz = cz + uz * 2 * hd;
          finalPositions[i * 3]     = wx;
          finalPositions[i * 3 + 1] = fn(wx, wz);
          finalPositions[i * 3 + 2] = wz;
        }

        for (let i = 0; i < pos.length; i++) pos[i] = initPositions[i];
        geo.attributes.position.needsUpdate = true;
        geo.computeVertexNormals();

        const mat = new THREE.MeshBasicMaterial({
          color, transparent: true, opacity: 0.3, side: THREE.DoubleSide, depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        return { mesh, geo, initPositions, finalPositions, mat };
      }

      const surf1 = makeMorphSurface(u1, secFn, 0xf85149);
      const surf2 = makeMorphSurface(u2, sec2Fn, 0x58a6ff);
      g.add(surf1.mesh);
      g.add(surf2.mesh);

      // Wireframe overlays
      const wire1Mat = new THREE.MeshBasicMaterial({
        color: 0xf85149, wireframe: true, transparent: true, opacity: 0, depthWrite: false
      });
      g.add(new THREE.Mesh(surf1.geo, wire1Mat));
      const wire2Mat = new THREE.MeshBasicMaterial({
        color: 0x58a6ff, wireframe: true, transparent: true, opacity: 0, depthWrite: false
      });
      g.add(new THREE.Mesh(surf2.geo, wire2Mat));

      // Overlap fill (fades in at end)
      const ov = { x1: -1, x2: 1, z1: -2, z2: 3 };
      const ovFill = new THREE.Mesh(
        new THREE.PlaneGeometry(ov.x2 - ov.x1, ov.z2 - ov.z1),
        new THREE.MeshBasicMaterial({ color: 0xbc8cff, transparent: true, opacity: 0, side: THREE.DoubleSide })
      );
      ovFill.rotation.x = -Math.PI / 2;
      ovFill.position.set((ov.x1 + ov.x2) / 2, 0.03, (ov.z1 + ov.z2) / 2);
      g.add(ovFill);

      // Labels
      const lbl1 = makeLabel('e\u2081 \u2192 section s\u2081', new THREE.Vector3(-4.5, 4.5, 0), '#cf222e', 0.6);
      lbl1.material.opacity = 0.8;
      g.add(lbl1);
      const lbl2 = makeLabel('e\u2082 \u2192 section s\u2082', new THREE.Vector3(4.5, 4.5, 0), '#0969da', 0.6);
      lbl2.material.opacity = 0.8;
      g.add(lbl2);

          pos[2] = lerp(z1, 0, p);
          pos[5] = lerp(z2, 0, p);
          line.geometry.attributes.position.needsUpdate = true;
          line.computeLineDistances();
          line.material.opacity = 0.7 * (1 - p);
        }

        // Section surfaces: z-coords → 0, fade out as curves take over
        for (const surf of d.surfaces) {
          const pos = surf.geometry.attributes.position.array;
          const origZ = surf.userData.origZ;
          for (let i = 0; i < origZ.length; i++) {
            pos[i * 3 + 2] = lerp(origZ[i], 0, p);
          }
          surf.geometry.attributes.position.needsUpdate = true;
          surf.material.opacity = 0.25 * (1 - p);
        }
        // Wireframes fade out
        for (const wire of d.wireframes) {
          wire.material.opacity = 0.06 * (1 - p);
        }
        // Section curves fade in
        for (const curve of d.sectionCurves) {
          curve.material.opacity = p;
        }

        // Pre-collapse labels fade out
        for (const lbl of d.labels) {
          lbl.material.opacity = 1 - p;
          lbl.position.z = lerp(lbl.position.z, 0, p * 0.3);
        }

        // Base line fades in
        d.baseLine.material.opacity = lerp(0, 0.8, p);

        // Post-collapse label fades in
        d.postLabel.material.opacity = p;

        // Camera transitions from oblique to flat
        if (p < 1) camLerpActive = true;
        targetCamPos.set(
          lerp(10, 0, p),
          lerp(8, 2, p),
          lerp(10, 16, p)
        );
        targetCamTarget.set(0, lerp(2, 1.5, p), 0);
      }

      // ── Scan line after collapse ──
      const scanStart = d.collapseStart + d.collapseDur + 0.5;
      if (t >= scanStart && d.scanLine) {
        const fadeIn = Math.min((t - scanStart) / 0.8, 1);
        const scanSpeed = 5; // seconds per sweep
        const scanFrac = ((t - scanStart) / scanSpeed) % 1;
        const sx = lerp(-6, 6, scanFrac);

        // Update scan line position
        const slPos = d.scanLine.geometry.attributes.position.array;
        slPos[0] = sx; slPos[3] = sx;
        d.scanLine.geometry.attributes.position.needsUpdate = true;
        d.scanLine.material.opacity = fadeIn * 0.4;

        // Base dot
        d.baseDot.position.set(sx, 0, 0);
        d.baseDot.material.opacity = fadeIn;

        // Section dots — visible when x is within their domain
        const inU1 = sx >= d.u1.x1 && sx <= d.u1.x2;
        const inU2 = sx >= d.u2.x1 && sx <= d.u2.x2;
        const y1 = inU1 ? d.secFn(sx) : 0;
        const y2 = inU2 ? d.sec2Fn(sx) : 0;

        d.secDot1.position.set(sx, y1, 0);
        d.secDot1.material.opacity = inU1 ? fadeIn : 0;
        d.secDot2.position.set(sx, y2, 0);
        // Hide secDot2 when it overlaps secDot1 (in the overlap region they agree)
        d.secDot2.material.opacity = (inU2 && !(inU1 && inU2)) ? fadeIn : 0;

        // Connector line from base to highest section dot
        const topY = inU1 ? y1 : (inU2 ? y2 : 0);
        if (inU1 || inU2) {
          const cPos = d.connectorLine.geometry.attributes.position.array;
          cPos[0] = sx; cPos[1] = 0; cPos[2] = 0;
          cPos[3] = sx; cPos[4] = topY; cPos[5] = 0;
          d.connectorLine.geometry.attributes.position.needsUpdate = true;
          d.connectorLine.computeLineDistances();
          d.connectorLine.material.opacity = fadeIn * 0.35;
        } else {
          d.connectorLine.material.opacity = 0;
        }
      }
    }
  },

  // ─── STAGE 2b: KERNEL STABILIZATION ───
  {
    id: 'kernel',
    title: 'Kernel Stabilization',
    text: `In the previous stage, clicking different dots produced different orderings. But the evaluation function <span class="math">e</span> has a <em>kernel</em>: the equivalence <span class="math">ker<sub>b</sub>(p) = {a ∈ 𝒟 | e<sub>b</sub>(a) = p}</span> partitions each stalk into equivalence classes (§5.3.2). <strong>Click any dot</strong> — now the same buckets form every time, regardless of which dot you pick. This is <em>kernel-coherence</em> (§5.3.3): the equivalence is independent of the standard chosen. The Δ-resolution (§5.7) quotients <span class="math">𝒟</span> by this stable equivalence: the passage from useful things to <em>commodities</em> <span class="math">C</span>.`,
    cam: { pos: [0, 2.5, 16], target: [0, 2, 0] },
    stageData: {},
    setup(g) {
      makeBaseLine(g);

      // Use makeCloud, then override colors and orderedY for bucket assignment
      const NUM_BUCKETS = 5;
      const cloud = makeCloud(g, FIBER_POSITIONS, 40);
      const { instancedMesh, dotData, TOTAL_DOTS } = cloud;
      const tmpColor = new THREE.Color();

      // Stable bucket Y positions
      const bucketYs = [];
      for (let b = 0; b < NUM_BUCKETS; b++) {
        bucketYs.push(0.6 + b * (4.0 / (NUM_BUCKETS - 1)));
      }

      // Override: assign deterministic bucket, recolor by bucket, set stable orderedY
      for (let i = 0; i < TOTAL_DOTS; i++) {
        const dd = dotData[i];
        const bucket = Math.floor(rng(dd.fiberX * 7 + (i % 40) * 59) * NUM_BUCKETS);
        dd.bucket = bucket;
        dd.color = FIBER_COLORS[bucket];
        dd.orderedY = bucketYs[bucket] + (rng(dd.fiberX * 41 + (i % 40) * 67) - 0.5) * 0.15;
        tmpColor.set(FIBER_COLORS[bucket]);
        instancedMesh.instanceColor.setXYZ(i, tmpColor.r, tmpColor.g, tmpColor.b);
      }
      instancedMesh.instanceColor.needsUpdate = true;

      // Bucket labels (shown when fixated)
      const bucketLabels = [];
      for (let b = 0; b < NUM_BUCKETS; b++) {
        const lbl = makeLabel('[' + FIBER_NAMES[b] + ']', new THREE.Vector3(-8.5, bucketYs[b], 0), '#57606a', 0.45);
        lbl.material.opacity = 0;
        g.add(lbl);
        bucketLabels.push(lbl);
      }

      // Y-axis
      const yAxis = makeTube([new THREE.Vector3(-8.5, 0, 0), new THREE.Vector3(-8.5, 5, 0)], 0.025, 0xafb8c1, 0);
      g.add(yAxis);
      const yLabel = makeLabel('magnitude', new THREE.Vector3(-8.5, 5.6, 0), '#57606a', 0.65);
      yLabel.material.opacity = 0;
      g.add(yLabel);

      const stateLabel = makeLabel('click any dot — same buckets every time', new THREE.Vector3(0, -0.8, 0), '#57606a', 0.55);
      g.add(stateLabel);
      const topLabel = makeLabel('ker(e): stable equivalence classes', new THREE.Vector3(0, 5.5, 0), '#8250df', 0.8);
      g.add(topLabel);

      // Click handler
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let fixated = false;
      let transitionStart = -1;
      let clickCount = 0;

      // Shuffle bucket Y positions per fiber — same colors cluster,
      // but each base point gets its own magnitude ordering
      function shuffleBucketOrder(seed) {
        for (const fx of FIBER_POSITIONS) {
          // Fisher-Yates with per-fiber + per-click seed
          const perm = [0, 1, 2, 3, 4];
          for (let i = perm.length - 1; i > 0; i--) {
            const j = Math.floor(rng(seed * 97 + fx * 131 + i * 53) * (i + 1));
            [perm[i], perm[j]] = [perm[j], perm[i]];
          }
          // Update orderedY for dots on this fiber
          for (const ii of cloud.fibers[fx]) {
            const dd = dotData[ii];
            const newSlot = perm[dd.bucket];
            dd.orderedY = bucketYs[newSlot] + (rng(dd.fiberX * 41 + (ii % 40) * 67) - 0.5) * 0.15;
          }
        }
      }

      const onClick = (event) => {
        if (STAGES[currentStage]?.id !== 'kernel') return;
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(instancedMesh);

        if (hits.length === 0 && fixated) {
          fixated = false;
          transitionStart = performance.now() / 1000;
          for (let ii = 0; ii < TOTAL_DOTS; ii++) dotData[ii].scale = 1;
          const newState = makeLabel('click any dot — same groups, different magnitudes', stateLabel.position.clone(), '#57606a', 0.55);

          stateLabel.scale.copy(newState.scale);
          return;

        if (hits.length === 0) return;
        const clickedIdx = hits[0].instanceId;
        fixated = true;
        clickCount++;
        transitionStart = performance.now() / 1000;

        // Reset all scales, then highlight clicked dot
        for (let ii = 0; ii < TOTAL_DOTS; ii++) dotData[ii].scale = 1;
        dotData[clickedIdx].scale = 1.8;

        // Shuffle bucket order — colors stay grouped, magnitudes change
        shuffleBucketOrder(clickCount);

        const newState = makeLabel('same classes, new magnitudes — click another dot', stateLabel.position.clone(), '#1a7f37', 0.55);
        stateLabel.material = newState.material;
        stateLabel.scale.copy(newState.scale);
      };
      renderer.domElement.addEventListener('click', onClick);

      this.stageData = {
        cloud, yAxis, yLabel, bucketLabels,
        fixated: () => fixated,
        transitionStart: () => transitionStart,
        onClick,
      };
    },
    update(t) {
      const d = this.stageData;
      if (!d.cloud) return;
      const fixated = d.fixated();
      const targetOpacity = fixated ? 0.8 : 0;
      d.yAxis.material.opacity = lerp(d.yAxis.material.opacity, targetOpacity, 0.06);
      d.yLabel.material.opacity = lerp(d.yLabel.material.opacity, targetOpacity, 0.06);
      updateCloud(d.cloud, t, fixated);
      const lineOpacity = fixated ? 0.7 : 0.4;
      for (const fl of d.cloud.fiberLines) {
        fl.material.opacity = lerp(fl.material.opacity, lineOpacity, 0.05);
      }
    },
    teardown() {
      if (this.stageData.onClick) {
        renderer.domElement.removeEventListener('click', this.stageData.onClick);
      }
    }
  },

  // ─── STAGE 2: COMPATIBLE AND INCOMPATIBLE SECTIONS ───
  {
    id: 'compatible',

    text: `Multiple sections can coexist over the same region. Two sections are <em>compatible</em> if they agree on their overlap — they assign the same values wherever both are defined (§10.6.1). Compatible sections can potentially be <em>glued</em> into a larger section. <strong>Incompatible</strong> sections disagree on their overlap: different price assignments for the same conditions (§10.6.3). A <em>sheaf</em> is a presheaf where all compatible families glue. A <em>presheaf that isn't a sheaf</em> has compatible families that refuse to glue — the obstruction that capital exploits (§16.5.1).`,
    cam: { pos: [0, 2.8, 16], target: [0, 2, 0] },
    stageData: {},
    setup(g) {
      makeBaseLine(g);
      makeYAxis(g);

      // --- LEFT SIDE: compatible sections ---
      // Section A (green): defined on [-7, 0]
      const secAFn = x => 2.0 + 0.5 * Math.sin(x * 0.7) + 0.2 * Math.cos(x * 1.3);
      // Section B (cyan): defined on [-3, 4], AGREES with A on overlap [-3, 0]
      const secBFn = x => {
        if (x <= 0) return secAFn(x); // exact agreement on overlap
        return secAFn(0) + 0.4 * Math.sin(x * 0.9) + 0.15 * x; // continues smoothly
      };
      const secA = makeAnimatedDash(secAFn, -7, 0, 0x7ee787);
      const secB = makeAnimatedDash(secBFn, -3, 4, 0x58a6ff);
      g.add(secA); g.add(secB);
      // Overlap highlight [-3, 0]
      const overlapPts = [];
      for (let x = -3; x <= 0; x += 0.05) overlapPts.push(new THREE.Vector2(x, 0));
      for (let x = 0; x >= -3; x -= 0.05) overlapPts.push(new THREE.Vector2(x, secAFn(x)));
      if (overlapPts.length > 4) g.add(makeFilledRegion(overlapPts, 0x7ee787, 0.08));

      g.add(makeTube([new THREE.Vector3(-7, -0.15, 0), new THREE.Vector3(0, -0.15, 0)], 0.02, 0x7ee787, 0.5));
      g.add(makeTube([new THREE.Vector3(-3, -0.35, 0), new THREE.Vector3(4, -0.35, 0)], 0.02, 0x58a6ff, 0.5));
      g.add(makeLabel('section A', new THREE.Vector3(-5, 3.5, 0), '#1a7f37', 0.65));
      g.add(makeLabel('section B', new THREE.Vector3(2, 3.5, 0), '#0969da', 0.65));
      g.add(makeLabel('compatible \u2713', new THREE.Vector3(-1.5, 0.8, 0), '#1a7f37', 0.65));
      g.add(makeLabel('(agree on overlap)', new THREE.Vector3(-1.5, 0.3, 0), '#57606a', 0.45));

      // --- RIGHT SIDE: incompatible sections ---
      // Section C (orange): defined on [2, 8], high
      const secCFn = x => 3.8 + 0.4 * Math.sin(x * 0.6);
      // Section D (red-ish): defined on [5, 8], low — clear disagreement with C
      const secDFn = x => 1.2 + 0.3 * Math.cos(x * 0.5);
      const secC = makeAnimatedDash(secCFn, 2, 8, 0xffa657);
      const secD = makeAnimatedDash(secDFn, 5, 8, 0xf85149);
      g.add(secC); g.add(secD);
      // Clash zone [5, 8] — shaded region between the two curves
      const clashPts = [];
      for (let x = 5; x <= 8; x += 0.05) clashPts.push(new THREE.Vector2(x, secCFn(x)));
      for (let x = 8; x >= 5; x -= 0.05) clashPts.push(new THREE.Vector2(x, secDFn(x)));
      if (clashPts.length > 4) g.add(makeFilledRegion(clashPts, 0xf85149, 0.1));
      // Region brackets
      g.add(makeTube([new THREE.Vector3(2, -0.15, 0), new THREE.Vector3(8, -0.15, 0)], 0.02, 0xffa657, 0.5));
      g.add(makeTube([new THREE.Vector3(5, -0.35, 0), new THREE.Vector3(8, -0.35, 0)], 0.02, 0xf85149, 0.5));
      g.add(makeLabel('section C', new THREE.Vector3(3.5, 4.6, 0), '#9a6700', 0.65));
      g.add(makeLabel('section D', new THREE.Vector3(7, 0.6, 0), '#cf222e', 0.65));
      g.add(makeLabel('incompatible \u2717', new THREE.Vector3(6.5, 2.5, 0), '#cf222e', 0.65));
      g.add(makeLabel('(disagree on overlap)', new THREE.Vector3(6.5, 2.0, 0), '#57606a', 0.45));

      // Store all dashed lines for animation
      this.stageData = { lines: [secA, secB, secC, secD] };
    },
    update(t) {
      const speed = 0.8;
      for (const line of this.stageData.lines || []) {
        line.material.uniforms.uOffset.value = -t * speed;
      }
    }
  },

  // ─── STAGE 3: RESTRICTION ───
  {
    id: 'restriction',
    title: 'Restriction Preserves Validity',
    text: `If a statement is valid over region <span class="math">U</span>, the restriction map <span class="math">r<sub>U,V</sub></span> carries it to any sub-region <span class="math">V \u2286 U</span> while preserving validity (§10.6). This is the defining property of a <em>presheaf</em>: data over opens restricts coherently. Zooming in never breaks a valid statement. This is what makes our picture a presheaf of evaluations <span class="math">\u2130(U)</span>.`,
    cam: { pos: [2, 2.5, 12], target: [2, 1.8, 0] },
    setup(g) {
      // Base line

  // ─── STAGE 3: CIRCULATION SPACES ───
  {
    id: 'circulation',
    title: 'Multiple Circulation Spaces',
    text: `The line fragments into circulation spaces <span class="math">CC\u2081, CC\u2082, CC\u2083</span> — each governed by its own <em>monetary topology</em> <span class="math">j<sub>m<sub>k</sub></sub></span> (§16.4.5), with its own money-commodity and price system. Within each, sections are locally coherent — the kernel is stable (§5.3.3). At the boundaries (red walls), sections disagree. These <em>circulation gaps</em> are Čech 1-cocycles: the presheaf <span class="math">\u2130</span> is separated but not a sheaf.<br><br><strong>Merchant and usury capital</strong> profit from these walls. But this profit is pure <em>redistribution</em>, not value creation: the wall shifts surplus between CCs without enlarging the total. Watch the wall dissolve and return — the gap is <em>eliminable in principle</em>: unifying monetary topologies turns the cocycle into a coboundary.`,
    cam: { pos: [0, 2.8, 16], target: [0, 2, 0] },
    stageData: {},
    setup(g) {
      const d = this.stageData;
      const names = ['CC\u2081', 'CC\u2082', 'CC\u2083'];
      for (let i = 0; i < 3; i++) {
        const [a, b] = CC_BOUNDS[i];
        g.add(makeTube([new THREE.Vector3(a, 0, 0), new THREE.Vector3(b, 0, 0)], 0.05, CC_COLORS[i]));
        g.add(makeTube([new THREE.Vector3(a, 0, 0), new THREE.Vector3(b, 0, 0)], 0.13, CC_COLORS[i], 0.12));
        g.add(makeLabel(names[i], new THREE.Vector3((a + b) / 2, -0.8, 0), '#57606a', 0.8));
      }
      // Section curves for CC₁ and CC₂ (stored for animation), CC₃ is static
      const pts1 = sampleCurve(cc1Fn, -7.9, -2.1);
      d.cc1Tube = makeTube(pts1, 0.04, CC_COLORS[0]);
      g.add(d.cc1Tube);
      const pts2 = sampleCurve(cc2Fn, -1.9, 2.9);
      d.cc2Tube = makeTube(pts2, 0.04, CC_COLORS[1]);
      g.add(d.cc2Tube);
      const pts3 = sampleCurve(cc3Fn, 3.1, 7.9);
      g.add(makeTube(pts3, 0.04, CC_COLORS[2]));
      // Walls — left wall animates, right wall static
      d.leftWall = makeWall(-2, 5.5);
      g.add(d.leftWall);
      g.add(makeWall(3, 5.5));
      // Gap indicators
      d.deltaLeft = makeLabel('\u0394', new THREE.Vector3(-2, (cc1Fn(-2.1) + cc2Fn(-1.9)) / 2, 0), '#cf222e', 0.8);
      g.add(d.deltaLeft);
      g.add(makeLabel('\u0394', new THREE.Vector3(3, (cc2Fn(2.9) + cc3Fn(3.1)) / 2, 0), '#cf222e', 0.8));
      // Y-axis
      g.add(makeTube([new THREE.Vector3(-8.5, 0, 0), new THREE.Vector3(-8.5, 5, 0)], 0.02, 0xafb8c1));
      // Animation labels (hidden initially)
      d.mergeLabel = makeLabel('wall removed: cocycle \u2192 coboundary', new THREE.Vector3(-2, 5.8, 0), '#1a7f37', 0.8);
      d.mergeLabel.material.opacity = 0;
      g.add(d.mergeLabel);
      d.restoreLabel = makeLabel('wall restored: obstruction returns', new THREE.Vector3(-2, 5.8, 0), '#cf222e', 0.8);
      d.restoreLabel.material.opacity = 0;
      g.add(d.restoreLabel);
      d.lastBlend = -1;
      d.group = g;
    },
    update(t) {
      const d = this.stageData;
      if (!d.leftWall) return;
      // 15-second cycle
      const cycle = 15;
      const ct = t % cycle;
      let blend = 0; // 0 = walls up (separate), 1 = walls down (merged)
      if (ct >= 4 && ct < 6) {
        blend = smoothstep((ct - 4) / 2);
      } else if (ct >= 6 && ct < 9) {
        blend = 1;
      } else if (ct >= 9 && ct < 11) {
        blend = 1 - smoothstep((ct - 9) / 2);
      }
      // Wall opacity
      d.leftWall.material.opacity = 0.35 * (1 - blend);
      // Delta label opacity
      d.deltaLeft.material.opacity = 0.8 * (1 - blend);
      // Labels
      d.mergeLabel.material.opacity = (ct >= 5 && ct < 9) ? Math.min((ct - 5), 1) * 0.8 : 0;
      d.restoreLabel.material.opacity = (ct >= 9.5 && ct < 12) ? Math.min((ct - 9.5) * 2, 1) * 0.8 * Math.max(0, 1 - (ct - 10.5)) : 0;
      // Rebuild section tube geometry when blend changes
      if (Math.abs(blend - d.lastBlend) > 0.02) {
        d.lastBlend = blend;
        // Blended function: sigmoid crossfade between cc1Fn and cc2Fn around x = -2
        const blendedFn = x => {
          const sig = 1 / (1 + Math.exp(-2 * (x + 2)));
          return lerp(cc1Fn(x), cc2Fn(x), sig);
        };
        // CC₁ section: when blend > 0, extend rightward and blend toward merged
        const pts1 = [];
        const x1Min = -7.9;
        const x1Max = lerp(-2.1, -0.5, blend);
        for (let i = 0; i <= 120; i++) {
          const x = x1Min + (x1Max - x1Min) * i / 120;
          const y = lerp(cc1Fn(x), blendedFn(x), blend);
          pts1.push(new THREE.Vector3(x, y, 0));
        }
        if (d.cc1Tube.geometry) d.cc1Tube.geometry.dispose();
        const curve1 = new THREE.CatmullRomCurve3(pts1);
        d.cc1Tube.geometry = new THREE.TubeGeometry(curve1, 480, 0.04, 8, false);
        // CC₂ section: when blend > 0, extend leftward and blend toward merged
        const pts2 = [];
        const x2Min = lerp(-1.9, -3.5, blend);
        const x2Max = 2.9;
        for (let i = 0; i <= 120; i++) {
          const x = x2Min + (x2Max - x2Min) * i / 120;
          const y = lerp(cc2Fn(x), blendedFn(x), blend);
          pts2.push(new THREE.Vector3(x, y, 0));
        }
        if (d.cc2Tube.geometry) d.cc2Tube.geometry.dispose();
        const curve2 = new THREE.CatmullRomCurve3(pts2);
        d.cc2Tube.geometry = new THREE.TubeGeometry(curve2, 480, 0.04, 8, false);
      }
    }
  },

  // ─── STAGE 4: ARBITRAGE VS CAPITAL ───
  {
    id: 'arbitrage',
    title: 'Arbitrage vs. Capital',
    text: `Within a <span class="math">CC</span>, competitive arbitrage contracts prices toward the determinant of value (§7.8) — price deviations are <em>coboundaries</em> (<span class="math">H\u2070 = 0</span>). Watch the individual prices (orange dots) spring toward the social value curve. But at CC boundaries, the gap is structural: different monetary topologies <span class="math">j<sub>m\u2081</sub>, j<sub>m\u2082</sub></span> produce Čech 1-cocycles (<strong>H\u00B9 \u2260 0</strong>).<br><br><strong>Merchant capital</strong> (gold dot) exploits <span class="math">H\u00B9</span>: buying low in one CC, selling high in another. The height-jump at the wall IS the profit. But the wall is <em>eliminable in principle</em> — unifying monetary topologies makes the cocycle a coboundary and the gap vanishes. <span class="math">H\u00B9</span> measures what is structurally present but contingently removable.`,
    cam: { pos: [0, 2.8, 16], target: [0, 2, 0] },
    stageData: {},
    setup(g) {
      const names = ['CC\u2081', 'CC\u2082', 'CC\u2083'];
      for (let i = 0; i < 3; i++) {
        const [a, b] = CC_BOUNDS[i];
        g.add(makeTube([new THREE.Vector3(a, 0, 0), new THREE.Vector3(b, 0, 0)], 0.05, CC_COLORS[i]));
        const pts = sampleCurve(CC_FNS[i], a + 0.1, b - 0.1);
        g.add(makeTube(pts, 0.04, CC_COLORS[i], 0.5));
        g.add(makeLabel(names[i], new THREE.Vector3((a + b) / 2, -0.8, 0), '#57606a', 0.8));
      }
      g.add(makeWall(-2, 5.5));
      g.add(makeWall(3, 5.5));

      // "Social value" label on the CC₂ section curve
      g.add(makeLabel('social value', new THREE.Vector3(0.5, cc2Fn(0.5) + 0.6, 0), '#1a7f37', 0.65));

      // Scattered price points in CC₂ that will spring toward the section
      this.stageData.dots = [];
      const rng = n => Math.sin(n * 127.1 + 311.7) * 0.5 + 0.5;
      for (let i = 0; i < 12; i++) {
        const x = -1.5 + rng(i) * 4;
        const targetY = cc2Fn(x);
        const startY = targetY + (rng(i + 50) - 0.5) * 2.8;
        const dot = makeSphere(new THREE.Vector3(x, startY, 0), 0.1, 0xffa657);
        // Each dot gets a slightly different spring frequency for organic feel
        const freq = 2.5 + rng(i + 80) * 1.5;    // 2.5–4.0 Hz
        const damping = 3.0 + rng(i + 90) * 1.5;  // 3.0–4.5 damping
        const delay = rng(i + 70) * 1.0;            // 0–1s stagger
        dot.userData = { startY, targetY, x, freq, damping, delay };
        g.add(dot);
        this.stageData.dots.push(dot);
        // Spring line connecting dot to target
        const spring = makeLine([new THREE.Vector3(x, startY, 0), new THREE.Vector3(x, targetY, 0)], 0xafb8c1, 0.3);
        dot.userData.spring = spring;
        g.add(spring);
      }
      // "Individual prices" label near the dots
      g.add(makeLabel('individual prices', new THREE.Vector3(0.5, 5.0, 0), '#9a6700', 0.65));

      // H⁰ / H¹ labels
      g.add(makeLabel('H\u2070 = 0', new THREE.Vector3(0.5, 5.8, 0), '#1a7f37', 0.95));
      g.add(makeLabel('arbitrage contracts', new THREE.Vector3(0.5, 5.2, 0), '#1a7f37', 0.55));
      g.add(makeLabel('H\u00B9 \u2260 0', new THREE.Vector3(-2, 5.8, 0), '#cf222e', 0.95));
      g.add(makeLabel('H\u00B9 \u2260 0', new THREE.Vector3(3, 5.8, 0), '#cf222e', 0.95));

      // Capital arrow across the wall
      const arrTopY = CC_FNS[1](-1.9);
      const arrBotY = CC_FNS[0](-2.1);
      g.add(makeTube([new THREE.Vector3(-2.5, arrBotY, 0), new THREE.Vector3(-1.5, arrTopY, 0)], 0.035, 0xffa657));
      g.add(makeLabel('capital exploits gap', new THREE.Vector3(-4.5, (arrTopY + arrBotY) / 2 + 0.5, 0), '#9a6700', 0.55));

      // Merchant capital dot (gold) — traces path across CC₁ → wall → CC₂ → return
      const merchantDot = makeSphere(new THREE.Vector3(-4, cc1Fn(-4), 0), 0.14, 0xd4a017);
      g.add(merchantDot);
      this.stageData.merchantDot = merchantDot;

      // Merchant keyframe path: CC₁ buy → wall → CC₂ sell → return
      this.stageData.merchantPath = [
        { x: -4, fn: cc1Fn },   // start in CC₁
        { x: -2.1, fn: cc1Fn }, // approach wall from CC₁ side
        { x: -1.9, fn: cc2Fn }, // cross wall into CC₂ (height jump)
        { x: 0.5, fn: cc2Fn },  // sell point in CC₂
        { x: -1.9, fn: cc2Fn }, // return to wall from CC₂ side
        { x: -2.1, fn: cc1Fn }, // cross back into CC₁
        { x: -4, fn: cc1Fn },   // return to start
      ];

      // Dashed route line (gold)
      const routePts = this.stageData.merchantPath.map(p => new THREE.Vector3(p.x, p.fn(p.x), 0));
      g.add(makeDashedLine(routePts, 0xd4a017, 0.2, 0.12));

      // Labels
      g.add(makeLabel('merchant capital', new THREE.Vector3(-4.5, cc1Fn(-4) + 0.8, 0), '#b8860b', 0.55));
      const profitLabel = makeLabel('\u0394 profit', new THREE.Vector3(-0.5, cc2Fn(0.5) + 0.7, 0), '#b8860b', 0.65);
      profitLabel.material.opacity = 0;
      g.add(profitLabel);
      this.stageData.profitLabel = profitLabel;
    },
    update(t) {
      if (!this.stageData.dots) return;
      for (const dot of this.stageData.dots) {
        const { startY, targetY, freq, damping, delay } = dot.userData;
        const elapsed = Math.max(t - delay, 0);
        // Damped spring: x(t) = target + (start - target) * e^(-d*t) * cos(2π*f*t)
        const displacement = (startY - targetY) * Math.exp(-damping * elapsed) * Math.cos(2 * Math.PI * freq * elapsed);
        const y = targetY + displacement;
        dot.position.y = y;
        // Update spring line
        const sp = dot.userData.spring;
        if (sp) {
          const posArr = sp.geometry.attributes.position.array;
          posArr[1] = y;
          sp.geometry.attributes.position.needsUpdate = true;
        }
      }
      // Merchant capital dot: 6-second cycle along keyframe path
      const md = this.stageData.merchantDot;
      const mp = this.stageData.merchantPath;
      const pl = this.stageData.profitLabel;
      if (md && mp) {
        const cycle = 6;
        const segments = mp.length - 1;
        const frac = (t % cycle) / cycle;
        const totalFrac = frac * segments;
        const segIdx = Math.min(Math.floor(totalFrac), segments - 1);
        const segFrac = totalFrac - segIdx;
        const sf = segFrac * segFrac * (3 - 2 * segFrac); // smoothstep
        const p0 = mp[segIdx], p1 = mp[segIdx + 1];
        const mx = lerp(p0.x, p1.x, sf);
        // Y from the appropriate CC function at interpolated x
        const my = (segIdx === 1 && sf > 0.8) ? lerp(p0.fn(p0.x), p1.fn(p1.x), sf)
                 : (segIdx === 4 && sf > 0.8) ? lerp(p0.fn(p0.x), p1.fn(p1.x), sf)
                 : (mx < -2 ? cc1Fn(mx) : cc2Fn(mx));
        md.position.set(mx, my, 0);
        // Profit label pulses during sell segment (seg 2-3)
        if (pl) {
          const inSell = segIdx === 2 || segIdx === 3;
          const targetOp = inSell ? 0.9 : 0;
          pl.material.opacity = lerp(pl.material.opacity, targetOp, 0.1);
        }
      }
    }
  },

  // ─── STAGE 5: VALORIZATION CIRCUIT ───

    text: `Capital traces a loop: <span class="math">M → C → P → C\u2019 → M\u2019</span>. This circuit bounds a <em>production disk</em>. We now ask: does the section extend consistently around this loop? If the Čech 1-cocycle around the boundary is trivial, sections glue and the loop closes. If not, the failure to glue is a <em>2-cocycle</em> — an obstruction living on the disk.`,

  // ─── STAGE 6: HOLONOMY / SPLIT COMPONENT ───
  {
    id: 'split',
    title: 'The Split Component',
    text: `Constant capital (<span style="color:#0969da">\u03C4, cyan</span>) contributes a coboundary: value in equals value out, and the section closes. Labor-power (<span style="color:#9a6700">\u2113, orange</span>) has a <em>double inscription</em>: purchased at <span class="math">t<sub>r</sub></span> but contributing <span class="math">t<sub>r</sub> + t<sub>s</sub></span> in production. The section jumps by <span class="math">t<sub>s</sub></span> — it fails to close. This non-trivial cocycle <em>is</em> surplus value. The obstruction lives on the production disk as a Čech 2-cocycle (<strong>H\u00B2 \u2260 0</strong>).`,
    cam: { pos: [7, 5.5, 9], target: [0, 2.5, 0] },
    stageData: {},
    setup(g) {
      const SURPLUS = 1.5;
      const BASE_Y = 2;
      const N = 120;
      // Constant capital path (closed, flat)
      const constPts = [];
      for (let i = 0; i <= N; i++) {
        const t = (i / N) * Math.PI * 2;
        constPts.push(new THREE.Vector3(3.5 * Math.cos(t), BASE_Y, 2.5 * Math.sin(t)));
      }
      g.add(makeTube(constPts, 0.035, 0x58a6ff, 0.6));
      // Labor power path (open, jumps at production)
      const laborPts = [];
      for (let i = 0; i <= N; i++) {
        const frac = i / N;
        const t = frac * Math.PI * 2;
        let y = BASE_Y;
        if (frac > 0.4 && frac < 0.6) {
          y = BASE_Y + SURPLUS * smoothstep((frac - 0.4) / 0.2);
        } else if (frac >= 0.6) {
          y = BASE_Y + SURPLUS;
        }
        laborPts.push(new THREE.Vector3(3.5 * Math.cos(t), y, 2.5 * Math.sin(t)));
      }
      g.add(makeTube(laborPts, 0.045, 0xffa657));
      g.add(makeTube(laborPts, 0.13, 0xffa657, 0.12));
      // Production disk
      const diskGeo = new THREE.CircleGeometry(2.8, 64);
      const diskMat = new THREE.MeshBasicMaterial({ color: 0xffa657, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
      const disk = new THREE.Mesh(diskGeo, diskMat);
      disk.rotation.x = -Math.PI / 2;
      disk.position.y = BASE_Y;
      disk.scale.set(1.25, 0.9, 1);
      g.add(disk);
      // Vertical gap arrow at M/M'
      const mx = 3.5, mz = 0;
      g.add(makeTube([
        new THREE.Vector3(mx + 0.3, BASE_Y, mz),
        new THREE.Vector3(mx + 0.3, BASE_Y + SURPLUS, mz)
      ], 0.03, 0xf85149));
      g.add(makeLabel('\u03B4 = t\u209B', new THREE.Vector3(mx + 1.5, BASE_Y + SURPLUS / 2, mz), '#cf222e', 0.8));
      // Start dot (M)
      g.add(makeSphere(new THREE.Vector3(mx, BASE_Y, mz), 0.12, 0x58a6ff));
      // End dot (M') — higher
      g.add(makeSphere(new THREE.Vector3(mx, BASE_Y + SURPLUS, mz), 0.12, 0xffa657));
      g.add(makeLabel('M', new THREE.Vector3(mx + 0.8, BASE_Y - 0.4, mz), '#0969da', 0.8));
      g.add(makeLabel("M'", new THREE.Vector3(mx + 0.8, BASE_Y + SURPLUS + 0.4, mz), '#9a6700', 0.8));
      // Labels around the loop

    update(t) {

            lerp(d.loopLabor[i].y, d.unrollLabor[i].y, blend),
            lerp(d.loopLabor[i].z, d.unrollLabor[i].z, blend)

      d.labelP.position.lerpVectors(d.labelPLoopPos, d.labelPUnrollPos, blend);

        // Fade in dome arc + fill
        d.domeArc.material.opacity = fadeProgress * 0.8;
        d.domeFill.material.opacity = fadeProgress * 0.12;
        // Fade out legend labels
        for (const lbl of d.legendLabels) {
          lbl.material.opacity = 1 - fadeProgress;
        }
      } else if (t >= 6.5 && !d.phase2Done) {
        d.phase2Done = true;
        d.disk.material.opacity = 0;
        d.domeArc.material.opacity = 0.8;
        d.domeFill.material.opacity = 0.12;
        for (const lbl of d.legendLabels) lbl.material.opacity = 0;
      }

      // ── Camera transition for Phase 2 ──
      if (t >= 3 && t < 6.5) {
        const camProgress = smoothstep(Math.min((t - 3) / 3.5, 1));
        targetCamPos.set(
          lerp(7, 2, camProgress),
          lerp(5.5, 4, camProgress),
          lerp(9, 14, camProgress)
        );
        targetCamTarget.set(
          lerp(0, 0, camProgress),
          lerp(2.5, 2, camProgress),
          lerp(0, 1, camProgress)
        );
        camLerpActive = true;
      }

      // ── Phase 3: decorations fade in (t > 7s, over 2s) ──
      if (t >= 7 && !d.phase3Done) {
        const fadeIn = Math.min((t - 7) / 2, 1);
        // Base line
        d.baseLine.material.opacity = fadeIn * 0.5;
        // CC segments
        for (const seg of d.ccSegments) seg.material.opacity = fadeIn * 0.6;
        // Walls
        for (const wall of d.walls) wall.material.opacity = fadeIn * 0.35;
        // Cohomology labels
        for (const lbl of d.cohomLabels) lbl.material.opacity = fadeIn;
        // Stokes label
        d.stokesLabel.material.opacity = fadeIn * 0.8;
        // CC labels
        for (const lbl of d.ccLabels) lbl.material.opacity = fadeIn * 0.7;

        if (fadeIn >= 1) d.phase3Done = true;
      }
    }
  }
];



// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
let currentStage = -1;
let stageTime = 0;
const badge = document.getElementById('stage-badge');
const title = document.getElementById('stage-title');
const text = document.getElementById('stage-text');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

function goToStage(idx) {
  if (idx < 0 || idx >= STAGES.length) return;

  // Teardown previous stage if it has cleanup
  if (currentStage >= 0 && STAGES[currentStage] && STAGES[currentStage].teardown) {
    STAGES[currentStage].teardown();
  }

  currentStage = idx;
  stageTime = 0;
  const s = STAGES[idx];

  // Update sidebar
  badge.textContent = `Stage ${idx + 1} of ${STAGES.length}`;
  title.textContent = s.title;
  text.innerHTML = s.text;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === STAGES.length - 1;

  // Clear stage group
  while (stageGroup.children.length) {
    const c = stageGroup.children[0];
    stageGroup.remove(c);
    disposeObject(c);
  }

  // Hide persistent grid for plane-based stages (0-4: eval-plane through projection)
  gridHelper.visible = (idx >= 5);

  // Setup new stage
  s.setup(stageGroup);

  // Camera target
  targetCamPos.set(...s.cam.pos);
  targetCamTarget.set(...s.cam.target);
  camLerpActive = true;
}

function disposeObject(obj) {
  if (obj.geometry) obj.geometry.dispose();
  if (obj.material) {
    if (obj.material.map) obj.material.map.dispose();
    obj.material.dispose();
  }
  if (obj.children) obj.children.forEach(disposeObject);
}

btnPrev.addEventListener('click', () => goToStage(currentStage - 1));
btnNext.addEventListener('click', () => goToStage(currentStage + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToStage(currentStage + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToStage(currentStage - 1);
});

// Start
goToStage(0);

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  stageTime += dt;

  // Smooth camera — only lerp during transitions, then let user orbit freely
  if (camLerpActive) {
    camera.position.lerp(targetCamPos, camLerp);
    controls.target.lerp(targetCamTarget, camLerp);
    if (camera.position.distanceTo(targetCamPos) < 0.05 &&
        controls.target.distanceTo(targetCamTarget) < 0.05) {
      camLerpActive = false;
    }
  }
  controls.update();

  // Stage-specific updates
  const s = STAGES[currentStage];
  if (s && s.update) s.update(stageTime);

  renderer.render(scene, camera);
}
animate();

</script>
