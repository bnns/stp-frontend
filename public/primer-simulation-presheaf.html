<script type="importmap">
{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════
// SCENE SETUP
// ═══════════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xf8f9fa);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
camera.position.set(0, 2, 18);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enableZoom = false;
controls.enablePan = false;
controls.target.set(0, 1.5, 0);
controls.addEventListener('start', () => { camLerpActive = false; });

const targetCamPos = new THREE.Vector3().copy(camera.position);
const targetCamTarget = new THREE.Vector3().copy(controls.target);
let camLerp = 0.04;
let camLerpActive = true;

function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);
resize();

// Ambient particles
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(300 * 3);
for (let i = 0; i < 300 * 3; i++) starPos[i] = (Math.random() - 0.5) * 60;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xd0d0dd, size: 0.08 })));

// Persistent faint grid
const gridHelper = new THREE.GridHelper(30, 30, 0xc0c8d0, 0xd0d8e0);
gridHelper.position.y = -0.01;
scene.add(gridHelper);

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function makeTube(points, radius, color, opacity = 1) {
  const curve = new THREE.CatmullRomCurve3(points);
  const geo = new THREE.TubeGeometry(curve, Math.max(points.length * 4, 64), radius, 8, false);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
  return new THREE.Mesh(geo, mat);
}

function makeLine(points, color, opacity = 1) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
  return new THREE.Line(geo, mat);
}

function makeDashedLine(points, color, dashSize = 0.3, gapSize = 0.15) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineDashedMaterial({ color, dashSize, gapSize, transparent: true, opacity: 0.7 });
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  return line;
}

function makeSphere(pos, radius, color) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 16, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  m.position.copy(pos);
  return m;
}

function makeFilledRegion(shapePts, color, opacity = 0.15) {
  const shape = new THREE.Shape();
  shape.moveTo(shapePts[0].x, shapePts[0].y);
  for (let i = 1; i < shapePts.length; i++) shape.lineTo(shapePts[i].x, shapePts[i].y);
  shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide });
  return new THREE.Mesh(geo, mat);
}

function makeLabel(text, position, color = '#1f2328', size = 1.45) {
  const canvas = document.createElement('canvas');
  // Measure text to size canvas appropriately
  const tempCtx = canvas.getContext('2d');
  tempCtx.font = 'bold 48px Georgia';
  const measured = tempCtx.measureText(text);
  const textWidth = Math.ceil(measured.width) + 40;
  canvas.width = Math.max(256, textWidth);
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 48px Georgia';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, 64);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const s = new THREE.Sprite(mat);
  s.position.copy(position);
  const aspect = canvas.width / canvas.height;
  s.scale.set(size * aspect, size, 1);
  return s;
}

function makeWall(x, height, color = 0xf85149, opacity = 0.35) {
  const geo = new THREE.PlaneGeometry(0.06, height);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, height / 2, 0);
  return m;
}

function sampleCurve(fn, xMin, xMax, steps = 120) {
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (xMax - xMin) * i / steps;
    pts.push(new THREE.Vector3(x, fn(x), 0));
  }
  return pts;
}

function smoothstep(t) { return t * t * (3 - 2 * t); }

// Animated dashed curve: custom ShaderMaterial for reliable marching-ants animation
function makeAnimatedDash(fn, xMin, xMax, color, opacity = 0.85, dashSize = 0.4, gapSize = 0.25) {
  const pts = sampleCurve(fn, xMin, xMax, 200);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  // Compute cumulative line distances as attribute
  const distances = new Float32Array(pts.length);
  distances[0] = 0;
  for (let i = 1; i < pts.length; i++) {
    distances[i] = distances[i - 1] + pts[i].distanceTo(pts[i - 1]);
  }
  geo.setAttribute('lineDistance', new THREE.BufferAttribute(distances, 1));
  const c = new THREE.Color(color);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    uniforms: {
      uColor: { value: c },
      uOpacity: { value: opacity },
      uDashSize: { value: dashSize },
      uGapSize: { value: gapSize },
      uOffset: { value: 0 },
    },
    vertexShader: `
      attribute float lineDistance;
      varying float vDist;
      void main() {
        vDist = lineDistance;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      uniform float uOpacity;
      uniform float uDashSize;
      uniform float uGapSize;
      uniform float uOffset;
      varying float vDist;
      void main() {
        float d = mod(vDist + uOffset, uDashSize + uGapSize);
        if (d > uDashSize) discard;
        gl_FragColor = vec4(uColor, uOpacity);
      }
    `,
  });
  return new THREE.Line(geo, mat);
}
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

// 3D cloud for plane-based stages
function makeCloud3D(g, count, opts = {}) {
  const xRange = opts.xRange || 12;
  const zRange = opts.zRange || 12;
  const yMin = opts.yMin || 1.5;
  const yMax = opts.yMax || 5;
  const xOff = opts.xOffset || 0;
  const zOff = opts.zOffset || 0;
  const radius = opts.radius || 0.09;

  const sphereGeo = new THREE.SphereGeometry(radius, 8, 6);
  const instancedMesh = new THREE.InstancedMesh(
    sphereGeo,
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    count
  );
  instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(count * 3), 3);
  g.add(instancedMesh);

  const dotData = new Array(count);
  const tmpMatrix = new THREE.Matrix4();
  const tmpColor = new THREE.Color();

  for (let i = 0; i < count; i++) {
    const curX = xOff + (rng(i * 37 + 13) - 0.5) * xRange;
    const curZ = zOff + (rng(i * 41 + 17) - 0.5) * zRange;
    const curY = yMin + rng(i * 59 + 23) * (yMax - yMin);
    const phase = rng(i * 67 + 29) * Math.PI * 2;
    const ampY = 0.15 + rng(i * 71 + 31) * 0.3;
    const ci = Math.floor(rng(i * 11 + 7) * FIBER_COLORS.length);

    dotData[i] = {
      curX, curY, curZ, baseY: curY, baseX: curX, baseZ: curZ,
      phase, ampY, color: FIBER_COLORS[ci], scale: 1
    };

    tmpMatrix.makeTranslation(curX, curY, curZ);
    instancedMesh.setMatrixAt(i, tmpMatrix);
    tmpColor.set(FIBER_COLORS[ci]);
    instancedMesh.instanceColor.setXYZ(i, tmpColor.r, tmpColor.g, tmpColor.b);
  }
  instancedMesh.instanceMatrix.needsUpdate = true;
  instancedMesh.instanceColor.needsUpdate = true;

  return { instancedMesh, dotData, count, tmpMatrix: new THREE.Matrix4() };
}

function updateCloud3D(cloud, t) {
  const mat = cloud.tmpMatrix;
  for (let i = 0; i < cloud.count; i++) {
    const dd = cloud.dotData[i];
    const targetY = dd.baseY + Math.sin(t * 1.2 + dd.phase) * dd.ampY;
    dd.curY = lerp(dd.curY, targetY, 0.07);
    const s = dd.scale;
    mat.makeScale(s, s, s);
    mat.setPosition(dd.curX, dd.curY, dd.curZ);
    cloud.instancedMesh.setMatrixAt(i, mat);
  }
  cloud.instancedMesh.instanceMatrix.needsUpdate = true;
}

function makeCollapsibleGrid(g, size, divisions, color = 0xc0c8d0, opacity = 0.3) {
  const half = size / 2;
  const step = size / divisions;
  const xLines = [];
  const zLines = [];

  for (let i = 0; i <= divisions; i++) {
    const z = -half + i * step;
    const line = makeLine([
      new THREE.Vector3(-half, 0, z),
      new THREE.Vector3(half, 0, z)
    ], color, opacity);
    g.add(line);
    xLines.push({ line, originalZ: z });
  }

  for (let i = 0; i <= divisions; i++) {
    const x = -half + i * step;
    const line = makeLine([
      new THREE.Vector3(x, 0, -half),
      new THREE.Vector3(x, 0, half)
    ], color, opacity);
    g.add(line);
    zLines.push({ line, originalX: x });
  }

  return { xLines, zLines };
}

// ═══════════════════════════════════════════════════════════════
// CURVE FUNCTIONS
// ═══════════════════════════════════════════════════════════════
const dinnerPrice = x => 2.2 + 0.5 * Math.sin(x * 0.55) + 0.25 * Math.cos(x * 1.1) + 0.15 * Math.sin(x * 1.8);
const BUDGET = 2.8;

const cc1Fn = x => 1.8 + 0.3 * Math.sin(x * 0.7);
const cc2Fn = x => 3.3 + 0.2 * Math.cos(x * 0.8);
const cc3Fn = x => 2.1 + 0.25 * Math.sin(x * 0.6 + 1);

const CC_BOUNDS = [[-8, -2], [-2, 3], [3, 8]];
const CC_COLORS = [0x58a6ff, 0x3fb950, 0xbc8cff];
const CC_FNS = [cc1Fn, cc2Fn, cc3Fn];


// ═══════════════════════════════════════════════════════════════
// SHARED CONSTANTS & CLOUD HELPERS
// ═══════════════════════════════════════════════════════════════
const FIBER_COLORS = [0xf85149, 0xffa657, 0x7ee787, 0x58a6ff, 0xbc8cff, 0x57606a];
const FIBER_NAMES = ['bread', 'iron', 'cloth', 'labor', 'tools', 'grain'];
const FIBER_POSITIONS = [-6, -3, 0, 3, 6];
const rng = n => Math.sin(n * 127.1 + 311.7) * 0.5 + 0.5;

function makeBaseLine(g, opacity = 1) {
  g.add(makeTube([new THREE.Vector3(-8, 0, 0), new THREE.Vector3(8, 0, 0)], 0.04, 0x58a6ff, opacity));
}

function makeYAxis(g, opacity = 1) {
  g.add(makeTube([new THREE.Vector3(-8.5, 0, 0), new THREE.Vector3(-8.5, 5, 0)], 0.025, 0xafb8c1, opacity));
  g.add(makeLabel('magnitude', new THREE.Vector3(-8.5, 5.6, 0), '#57606a', 0.8));
}

// Creates an InstancedMesh cloud of dots. Returns { instancedMesh, dotData, TOTAL_DOTS, tmpMatrix }.
// fiberXs: array of x positions for fibers (or single-element for one fiber)
// dotsPerFiber: dots per fiber
// opts: { radius, spread, yRange, showFiberLines, fiberLineOpacity }
function makeCloud(g, fiberXs, dotsPerFiber, opts = {}) {
  const radius = opts.radius || 0.09;
  const spread = opts.spread || 0.8;
  const yMin = opts.yMin || 0.4;
  const yRange = opts.yRange || 4.2;
  const showFiberLines = opts.showFiberLines !== false;
  const fiberLineOpacity = opts.fiberLineOpacity || 0.4;
  const fiberLineHeight = opts.fiberLineHeight || 5.5;

  const TOTAL_DOTS = fiberXs.length * dotsPerFiber;
  const sphereGeo = new THREE.SphereGeometry(radius, 8, 6);
  const instancedMesh = new THREE.InstancedMesh(
    sphereGeo,
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    TOTAL_DOTS
  );
  instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(TOTAL_DOTS * 3), 3);
  g.add(instancedMesh);

  const dotData = new Array(TOTAL_DOTS);
  const fibers = {};
  const fiberLines = [];
  const tmpMatrix = new THREE.Matrix4();
  const tmpColor = new THREE.Color();
  let idx = 0;

  for (const fx of fiberXs) {
    fibers[fx] = [];
    if (showFiberLines) {
      const fl = makeLine([new THREE.Vector3(fx, 0, 0), new THREE.Vector3(fx, fiberLineHeight, 0)], 0xc0c8d0, fiberLineOpacity);
      g.add(fl);
      fiberLines.push(fl);
    }
    for (let i = 0; i < dotsPerFiber; i++) {
      const baseY = yMin + rng(fx * 13 + i * 37) * yRange;
      const ci = Math.floor(rng(fx * 11 + i * 23) * FIBER_COLORS.length);
      const ni = Math.floor(rng(fx * 29 + i * 31) * FIBER_NAMES.length);
      const phase = rng(fx * 17 + i * 41) * Math.PI * 2;
      const ampY = 0.15 + rng(fx * 19 + i * 43) * 0.4;
      const ampX = 0.08 + rng(fx * 23 + i * 47) * 0.25;
      const baseX = fx + (rng(fx * 31 + i * 53) - 0.5) * spread;

      dotData[idx] = {
        baseY, baseX, fiberX: fx, phase, ampY, ampX,
        name: FIBER_NAMES[ni], color: FIBER_COLORS[ci],
        orderedY: 0, curX: baseX, curY: baseY, scale: 1,
      };
      fibers[fx].push(idx);

      tmpMatrix.makeTranslation(baseX, baseY, 0);
      instancedMesh.setMatrixAt(idx, tmpMatrix);
      tmpColor.set(FIBER_COLORS[ci]);
      instancedMesh.instanceColor.setXYZ(idx, tmpColor.r, tmpColor.g, tmpColor.b);
      idx++;
    }
  }
  instancedMesh.instanceMatrix.needsUpdate = true;
  instancedMesh.instanceColor.needsUpdate = true;

  return { instancedMesh, dotData, fibers, fiberLines, TOTAL_DOTS, tmpMatrix: new THREE.Matrix4() };
}

// Animate a cloud: wobble dots freely or snap to ordered positions if fixated
function updateCloud(cloud, t, fixated = false) {
  const mat = cloud.tmpMatrix;
  for (let i = 0; i < cloud.TOTAL_DOTS; i++) {
    const dd = cloud.dotData[i];
    if (fixated) {
      dd.curY = lerp(dd.curY, dd.orderedY, 0.07);
      dd.curX = lerp(dd.curX, dd.fiberX, 0.07);
    } else {
      const targetY = dd.baseY + Math.sin(t * 1.2 + dd.phase) * dd.ampY;
      const targetX = dd.baseX + Math.sin(t * 0.8 + dd.phase * 1.3) * dd.ampX;
      dd.curY = lerp(dd.curY, targetY, 0.07);
      dd.curX = lerp(dd.curX, targetX, 0.07);
    }
    const s = dd.scale;
    mat.makeScale(s, s, s);
    mat.setPosition(dd.curX, dd.curY, 0);
    cloud.instancedMesh.setMatrixAt(i, mat);
  }
  cloud.instancedMesh.instanceMatrix.needsUpdate = true;
}

// Shaded region helper (for sections/budget stages)
function flushSegment(g, xs) {
  if (xs.length < 3) return;
  const pts = [];
  for (const x of xs) pts.push(new THREE.Vector2(x, dinnerPrice(x)));
  pts.push(new THREE.Vector2(xs[xs.length - 1], BUDGET));
  pts.push(new THREE.Vector2(xs[0], BUDGET));
  g.add(makeFilledRegion(pts, 0x7ee787, 0.12));
}


// ═══════════════════════════════════════════════════════════════
// STAGE DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const stageGroup = new THREE.Group();
scene.add(stageGroup);

const STAGES = [
  // ─── STAGE 0: THE EVALUATION FUNCTION (PLANE) ───
  {
    id: 'eval-plane',
    title: 'The Evaluation Function',
    text: `Everything begins with a space of <em>value conditions</em> <span class="math">T</span> — the plane below. Above it floats a cloud of <em>useful things</em> <span class="math">D</span>: bread, iron, cloth, labor. The <em>evaluation function</em> <span class="math">e : D × D → T</span> asks: to what degree can one thing substitute for another? <strong>Click two dots</strong> to see which region of <span class="math">T</span> lights up — the value conditions under which that pair is exchangeable. Click again to reset.`,
    cam: { pos: [10, 8, 10], target: [0, 1.5, 0] },
    stageData: {},
    setup(g) {
      const grid = makeCollapsibleGrid(g, 16, 16);

      // Faint solid plane underneath
      const planeGeo = new THREE.PlaneGeometry(16, 16);
      const planeMat = new THREE.MeshBasicMaterial({ color: 0xeceff3, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -0.01;
      g.add(plane);

      // Dot cloud in 3D
      const cloud = makeCloud3D(g, 80, { xRange: 12, zRange: 12, yMin: 1.5, yMax: 5 });

      // Cell grid: 16x16 quads at y=0.01
      const cellGeo = new THREE.PlaneGeometry(0.95, 0.95);
      const cells = [];
      for (let r = 0; r < 16; r++) {
        for (let c = 0; c < 16; c++) {
          const mat = new THREE.MeshBasicMaterial({ color: 0x58a6ff, transparent: true, opacity: 0, side: THREE.DoubleSide });
          const cell = new THREE.Mesh(cellGeo, mat);
          cell.rotation.x = -Math.PI / 2;
          cell.position.set(-7.5 + c, 0.01, -7.5 + r);
          g.add(cell);
          cells.push(cell);
        }
      }

      // Labels
      g.add(makeLabel('D — useful things', new THREE.Vector3(0, 5.5, 0), '#57606a', 0.8));
      g.add(makeLabel('e : D \u00d7 D \u2192 T', new THREE.Vector3(0, -1.5, 0), '#8250df', 0.8));
      g.add(makeLabel('T — value conditions', new THREE.Vector3(8.5, 0, 0), '#57606a', 0.6));
      const stateLabel = makeLabel('click two dots to evaluate', new THREE.Vector3(0, -2.5, 0), '#57606a', 0.55);
      g.add(stateLabel);

      // Click interaction: 3-state machine
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let clickState = 'idle';
      let firstIdx = -1, secondIdx = -1;
      let vLine1 = null, vLine2 = null;

      const onClick = (event) => {
        if (STAGES[currentStage]?.id !== 'eval-plane') return;
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        if (clickState === 'pair') {
          // Third click: reset
          clickState = 'idle';
          cloud.dotData[firstIdx].scale = 1;
          cloud.dotData[secondIdx].scale = 1;
          if (vLine1) { g.remove(vLine1); vLine1 = null; }
          if (vLine2) { g.remove(vLine2); vLine2 = null; }
          for (const cell of cells) cell.material.opacity = 0;
          stateLabel.material.map.dispose();
          const ns = makeLabel('click two dots to evaluate', stateLabel.position.clone(), '#57606a', 0.55);
          stateLabel.material = ns.material;
          stateLabel.scale.copy(ns.scale);
          return;
        }

        const hits = raycaster.intersectObject(cloud.instancedMesh);
        if (hits.length === 0) return;
        const hitIdx = hits[0].instanceId;

        if (clickState === 'idle') {
          clickState = 'first';
          firstIdx = hitIdx;
          cloud.dotData[hitIdx].scale = 1.8;
          const dd = cloud.dotData[hitIdx];
          vLine1 = makeDashedLine([
            new THREE.Vector3(dd.curX, dd.curY, dd.curZ),
            new THREE.Vector3(dd.curX, 0, dd.curZ)
          ], 0x58a6ff);
          g.add(vLine1);
          stateLabel.material.map.dispose();
          const ns = makeLabel('click a second dot', stateLabel.position.clone(), '#1a7f37', 0.55);
          stateLabel.material = ns.material;
          stateLabel.scale.copy(ns.scale);
        } else if (clickState === 'first') {
          if (hitIdx === firstIdx) return;
          clickState = 'pair';
          secondIdx = hitIdx;
          cloud.dotData[hitIdx].scale = 1.8;
          const dd = cloud.dotData[hitIdx];
          vLine2 = makeDashedLine([
            new THREE.Vector3(dd.curX, dd.curY, dd.curZ),
            new THREE.Vector3(dd.curX, 0, dd.curZ)
          ], 0x58a6ff);
          g.add(vLine2);

          // Light up cells around midpoint of the two dots' XZ positions
          const d1 = cloud.dotData[firstIdx];
          const d2 = cloud.dotData[secondIdx];
          const midX = (d1.curX + d2.curX) / 2;
          const midZ = (d1.curZ + d2.curZ) / 2;
          const hash = Math.abs(Math.sin(firstIdx * 127.1 + secondIdx * 311.7));
          const rad = 2 + hash * 5;
          for (let r = 0; r < 16; r++) {
            for (let c = 0; c < 16; c++) {
              const cx = -7.5 + c;
              const cz = -7.5 + r;
              const dist = Math.sqrt((cx - midX) ** 2 + (cz - midZ) ** 2);
              if (dist < rad) {
                cells[r * 16 + c].material.opacity = (1 - dist / rad) * 0.4;
              }
            }
          }

          stateLabel.material.map.dispose();
          const ns = makeLabel('e(d\u2081,d\u2082) \u2208 T — click to reset', stateLabel.position.clone(), '#8250df', 0.55);
          stateLabel.material = ns.material;
          stateLabel.scale.copy(ns.scale);
        }
      };
      renderer.domElement.addEventListener('click', onClick);

      this.stageData = { cloud, onClick };
    },

    teardown() {

    }
  },

  // ─── STAGE 2: GLUING FIBERS ───
  {

    cam: { pos: [10, 8, 10], target: [0, 1.5, 0] },

                                   + 0.15 * Math.sin(x * 0.9 + z * 0.7);
      // sec2 agrees with secFn on overlap (x ≤ 1), continues independently beyond
      const sec2Fn = (x, z) => {

          const pos = line.geometry.attributes.position.array;
          const newZ = lerp(originalZ, 0, p);

          if (Math.abs(originalZ) > 0.01) {
            line.material.opacity = d.initOpacity * (1 - p);

        }

        // Grid zLines: endpoints collapse to z=0, fade out
        for (const { line } of d.grid.zLines) {
          const pos = line.geometry.attributes.position.array;
          pos[2] = lerp(-8, 0, p);
          pos[5] = lerp(8, 0, p);
          line.geometry.attributes.position.needsUpdate = true;
          line.material.opacity = d.initOpacity * (1 - p);
        }

        // Plane fades out
        d.planeMat.opacity = d.initOpacity * (1 - p);

        // Region fills: z → 0, scale.y shrinks, fade out
        for (const fill of d.regionFills) {
          fill.position.z = lerp(fill.userData.origZ, 0, p);
          fill.scale.y = lerp(1, 0.01, p);
          fill.material.opacity = fill.material.opacity * (1 - p * 0.5);
        }

        // Region outlines: z-coords → 0, all fade out
        for (const { line, z1, z2 } of d.outlineLines) {
          const pos = line.geometry.attributes.position.array;
          pos[2] = lerp(z1, 0, p);
          pos[5] = lerp(z2, 0, p);
          line.geometry.attributes.position.needsUpdate = true;
          line.computeLineDistances();
          line.material.opacity = 0.7 * (1 - p);
        }

        // Section surfaces: z-coords → 0, fade out as curves take over
        for (const surf of d.surfaces) {
          const pos = surf.geometry.attributes.position.array;
          const origZ = surf.userData.origZ;
          for (let i = 0; i < origZ.length; i++) {
            pos[i * 3 + 2] = lerp(origZ[i], 0, p);
          }
          surf.geometry.attributes.position.needsUpdate = true;
          surf.material.opacity = 0.25 * (1 - p);
        }
        // Wireframes fade out
        for (const wire of d.wireframes) {
          wire.material.opacity = 0.12 * (1 - p);
        }
        // Section curves fade in
        for (const curve of d.sectionCurves) {
          curve.material.opacity = p;
        }

        // Pre-collapse labels fade out
        for (const lbl of d.labels) {
          lbl.material.opacity = 1 - p;
          lbl.position.z = lerp(lbl.position.z, 0, p * 0.3);
        }

        // Base line fades in
        d.baseLine.material.opacity = lerp(0, 0.8, p);

        // Post-collapse label fades in
        d.postLabel.material.opacity = p;

        // Camera transitions from oblique to flat
        if (p < 1) camLerpActive = true;
        targetCamPos.set(
          lerp(10, 0, p),
          lerp(8, 2, p),
          lerp(10, 16, p)
        );
        targetCamTarget.set(0, lerp(2, 1.5, p), 0);
      }
    }
  },

  // ─── STAGE 1b: FIBERS — USEFUL THINGS TO COMMODITIES ───
  {
    id: 'fibers',

    text: `Above each point on the line sits a <em>fiber</em> — the set of <em>sections</em> (evaluation functions) passing through that condition. Each evaluator (<span class="math">e₁, e₂, e₃</span>) may assign a different magnitude to the same commodity, so the dots spread vertically: the spread <em>is</em> the disagreement between evaluators.<br><br><strong>Click a dot</strong> to impose a value axis — one evaluator's ordering becomes dominant, and the others fall into line. Click again to release. When the money-form is chosen, it selects a single evaluator and collapses the fiber to one height. That collapse is the passage from presheaf to (attempted) sheaf.`,
    cam: { pos: [0, 2.5, 16], target: [0, 2, 0] },

      const fiberPositions = FIBER_POSITIONS;

      const evalColors = [0x3fb950, 0xffa657, 0xbc8cff];

      const evaluatorLines = [];
      for (const fx of fiberPositions) {
        for (let i = 0; i < 3; i++) {

          });
          const line = new THREE.Line(geo, mat);

      }

      // Y-axis (hidden initially, shown on click)
      const yAxis = makeTube([new THREE.Vector3(-8.5, 0, 0), new THREE.Vector3(-8.5, 5, 0)], 0.025, 0xafb8c1, 0);
      g.add(yAxis);
      const yLabel = makeLabel('magnitude', new THREE.Vector3(-8.5, 5.6, 0), '#57606a', 0.65);

      g.add(yLabel);

      // State label
      const stateLabel = makeLabel('click a dot to impose value axis', new THREE.Vector3(0, -0.8, 0), '#57606a', 0.55);
      g.add(stateLabel);
      const topLabel = makeLabel('D — useful things', new THREE.Vector3(0, 5.5, 0), '#57606a', 0.8);
      g.add(topLabel);

      // Click handler using InstancedMesh raycasting
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let fixated = false;
      let transitionStart = -1;

      const onClick = (event) => {
        if (STAGES[currentStage]?.id !== 'fibers') return;
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(instancedMesh);

        if (fixated) {
          fixated = false;
          transitionStart = performance.now() / 1000;
          stateLabel.material.map.dispose();
          Object.assign(stateLabel, makeLabel('click a dot to impose value axis', stateLabel.position.clone(), '#57606a', 0.55));
          topLabel.material.map.dispose();

          return;
        }

        if (hits.length === 0) return;
        const clickedIdx = hits[0].instanceId;
        const clickedData = dotData[clickedIdx];
        fixated = true;
        transitionStart = performance.now() / 1000;

        // For each fiber, assign ordered Y positions
        for (const fx of fiberPositions) {
          const fiberIndices = fibers[fx];
          const shuffled = [...fiberIndices].sort(() => rng(fx + Math.random()) - 0.5);
          const isClickedFiber = (fx === clickedData.fiberX);
          let rank = 0;
          const spacing = 4.0 / fiberIndices.length;
          for (const di of shuffled) {
            if (di === clickedIdx) continue;
            dotData[di].orderedY = 0.5 + rank * spacing;
            dotData[di].scale = 1;
            rank++;
          }
          if (isClickedFiber) {
            clickedData.orderedY = 4.5;
            clickedData.scale = 1.8;
          }
        }

        stateLabel.material.map.dispose();
        const newState = makeLabel('value axis imposed — click to release', stateLabel.position.clone(), '#1a7f37', 0.55);
        stateLabel.material = newState.material;
        stateLabel.scale.copy(newState.scale);

        topLabel.material.map.dispose();
        const newTop = makeLabel(clickedData.name + ' = universal equivalent', topLabel.position.clone(), '#1a7f37', 0.8);
        topLabel.material = newTop.material;
        topLabel.scale.copy(newTop.scale);
      };
      renderer.domElement.addEventListener('click', onClick);

      this.stageData = {
        cloud, yAxis, yLabel, evaluatorLines,
        fixated: () => fixated,
        transitionStart: () => transitionStart,
        onClick,
      };
    },
    update(t) {
      const d = this.stageData;
      if (!d.cloud) return;
      const fixated = d.fixated();
      const targetAxisOpacity = fixated ? 0.8 : 0;
      d.yAxis.material.opacity = lerp(d.yAxis.material.opacity, targetAxisOpacity, 0.06);
      d.yLabel.material.opacity = lerp(d.yLabel.material.opacity, targetAxisOpacity, 0.06);
      updateCloud(d.cloud, t, fixated);
      const lineOpacity = fixated ? 0.7 : 0.4;
      for (const fl of d.cloud.fiberLines) {

      for (const el of d.evaluatorLines) {
        el.material.opacity = lerp(el.material.opacity, evalTarget, 0.06);
      }
    },
    teardown() {
      if (this.stageData.onClick) {
        renderer.domElement.removeEventListener('click', this.stageData.onClick);
      }

  },
  // ─── STAGE 2b: KERNEL STABILIZATION ───

  // ─── STAGE 4: ARBITRAGE VS CAPITAL ───
  {
    id: 'arbitrage',
    title: 'Arbitrage vs. Capital',
    text: `Within a CC, competitive arbitrage contracts prices toward social value — the fiber is <em>contractible</em> (<span class="math">H\u2070 = 0</span>). Watch the individual prices (orange dots) spring toward the social value curve. But at CC boundaries, the gap is topological: different monetary topologies <span class="math">j<sub>m\u2081</sub>, j<sub>m\u2082</sub></span> can't be smoothed away. Capital profits from these walls (<strong>H\u00B9 \u2260 0</strong>). The wall isn't a market inefficiency — it's a topological invariant.`,
    cam: { pos: [0, 2.8, 16], target: [0, 2, 0] },
    stageData: {},
    setup(g) {
      const names = ['CC\u2081', 'CC\u2082', 'CC\u2083'];
      for (let i = 0; i < 3; i++) {
        const [a, b] = CC_BOUNDS[i];
        g.add(makeTube([new THREE.Vector3(a, 0, 0), new THREE.Vector3(b, 0, 0)], 0.05, CC_COLORS[i]));
        const pts = sampleCurve(CC_FNS[i], a + 0.1, b - 0.1);
        g.add(makeTube(pts, 0.04, CC_COLORS[i], 0.5));
        g.add(makeLabel(names[i], new THREE.Vector3((a + b) / 2, -0.8, 0), '#57606a', 0.8));
      }
      g.add(makeWall(-2, 5.5));
      g.add(makeWall(3, 5.5));

      // "Social value" label on the CC₂ section curve
      g.add(makeLabel('social value', new THREE.Vector3(0.5, cc2Fn(0.5) + 0.6, 0), '#1a7f37', 0.65));

      // Scattered price points in CC₂ that will spring toward the section
      this.stageData.dots = [];
      const rng = n => Math.sin(n * 127.1 + 311.7) * 0.5 + 0.5;
      for (let i = 0; i < 12; i++) {
        const x = -1.5 + rng(i) * 4;
        const targetY = cc2Fn(x);
        const startY = targetY + (rng(i + 50) - 0.5) * 2.8;
        const dot = makeSphere(new THREE.Vector3(x, startY, 0), 0.1, 0xffa657);
        // Each dot gets a slightly different spring frequency for organic feel
        const freq = 2.5 + rng(i + 80) * 1.5;    // 2.5–4.0 Hz
        const damping = 3.0 + rng(i + 90) * 1.5;  // 3.0–4.5 damping
        const delay = rng(i + 70) * 1.0;            // 0–1s stagger
        dot.userData = { startY, targetY, x, freq, damping, delay };
        g.add(dot);
        this.stageData.dots.push(dot);
        // Spring line connecting dot to target
        const spring = makeLine([new THREE.Vector3(x, startY, 0), new THREE.Vector3(x, targetY, 0)], 0xafb8c1, 0.3);
        dot.userData.spring = spring;
        g.add(spring);
      }
      // "Individual prices" label near the dots
      g.add(makeLabel('individual prices', new THREE.Vector3(0.5, 5.0, 0), '#9a6700', 0.65));

      // H⁰ / H¹ labels
      g.add(makeLabel('H\u2070 = 0', new THREE.Vector3(0.5, 5.8, 0), '#1a7f37', 0.95));
      g.add(makeLabel('arbitrage contracts', new THREE.Vector3(0.5, 5.2, 0), '#1a7f37', 0.55));
      g.add(makeLabel('H\u00B9 \u2260 0', new THREE.Vector3(-2, 5.8, 0), '#cf222e', 0.95));
      g.add(makeLabel('H\u00B9 \u2260 0', new THREE.Vector3(3, 5.8, 0), '#cf222e', 0.95));

      // Capital arrow across the wall
      const arrTopY = CC_FNS[1](-1.9);
      const arrBotY = CC_FNS[0](-2.1);
      g.add(makeTube([new THREE.Vector3(-2.5, arrBotY, 0), new THREE.Vector3(-1.5, arrTopY, 0)], 0.035, 0xffa657));
      g.add(makeLabel('capital exploits gap', new THREE.Vector3(-4.5, (arrTopY + arrBotY) / 2 + 0.5, 0), '#9a6700', 0.55));
    },
    update(t) {
      if (!this.stageData.dots) return;
      for (const dot of this.stageData.dots) {
        const { startY, targetY, freq, damping, delay } = dot.userData;
        const elapsed = Math.max(t - delay, 0);
        // Damped spring: x(t) = target + (start - target) * e^(-d*t) * cos(2π*f*t)
        const displacement = (startY - targetY) * Math.exp(-damping * elapsed) * Math.cos(2 * Math.PI * freq * elapsed);
        const y = targetY + displacement;
        dot.position.y = y;
        // Update spring line
        const sp = dot.userData.spring;
        if (sp) {
          const posArr = sp.geometry.attributes.position.array;
          posArr[1] = y;
          sp.geometry.attributes.position.needsUpdate = true;
        }
      }
    }
  },

  // ─── STAGE 6: HOLONOMY / SPLIT COMPONENT ───
  {
    id: 'split',
    title: 'The Split Component',
    text: `Constant capital (<span style="color:#0969da">\u03C4, cyan</span>) transports flatly — value in equals value out, the path closes. Labor power (<span style="color:#9a6700">\u2113, orange</span>) has a <em>double inscription</em>: purchased at <span class="math">t<sub>r</sub></span> but contributing <span class="math">t<sub>r</sub> + t<sub>s</sub></span> in production. The fiber jumps by <span class="math">t<sub>s</sub></span> — the path doesn't close. This <strong>holonomy</strong> is surplus value. The curvature lives on the production disk (<strong>H\u00B2 \u2260 0</strong>).`,
    cam: { pos: [7, 5.5, 9], target: [0, 2.5, 0] },
    stageData: {},
    setup(g) {
      const SURPLUS = 1.5;
      const BASE_Y = 2;
      const N = 120;
      // Constant capital path (closed, flat)
      const constPts = [];
      for (let i = 0; i <= N; i++) {
        const t = (i / N) * Math.PI * 2;
        constPts.push(new THREE.Vector3(3.5 * Math.cos(t), BASE_Y, 2.5 * Math.sin(t)));
      }
      g.add(makeTube(constPts, 0.035, 0x58a6ff, 0.6));

      for (let i = 0; i <= N; i++) {

        const t = frac * Math.PI * 2;
        let y = BASE_Y;
        if (frac > 0.4 && frac < 0.6) {
          y = BASE_Y + SURPLUS * smoothstep((frac - 0.4) / 0.2);
        } else if (frac >= 0.6) {
          y = BASE_Y + SURPLUS;
        }
        laborPts.push(new THREE.Vector3(3.5 * Math.cos(t), y, 2.5 * Math.sin(t)));
      }
      g.add(makeTube(laborPts, 0.045, 0xffa657));
      g.add(makeTube(laborPts, 0.13, 0xffa657, 0.12));
      // Production disk
      const diskGeo = new THREE.CircleGeometry(2.8, 64);
      const diskMat = new THREE.MeshBasicMaterial({ color: 0xffa657, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
      const disk = new THREE.Mesh(diskGeo, diskMat);
      disk.rotation.x = -Math.PI / 2;
      disk.position.y = BASE_Y;
      disk.scale.set(1.25, 0.9, 1);
      g.add(disk);
      // Vertical gap arrow at M/M'
      const mx = 3.5, mz = 0;
      g.add(makeTube([
        new THREE.Vector3(mx + 0.3, BASE_Y, mz),
        new THREE.Vector3(mx + 0.3, BASE_Y + SURPLUS, mz)
      ], 0.03, 0xf85149));
      g.add(makeLabel('\u03B4 = t\u209B', new THREE.Vector3(mx + 1.5, BASE_Y + SURPLUS / 2, mz), '#cf222e', 0.8));

      g.add(makeLabel('M', new THREE.Vector3(mx + 0.8, BASE_Y - 0.4, mz), '#0969da', 0.8));
      g.add(makeLabel("M'", new THREE.Vector3(mx + 0.8, BASE_Y + SURPLUS + 0.4, mz), '#9a6700', 0.8));
      // Labels around the loop
      const labelData = [['C', 0.25], ['P', 0.5], ["C'", 0.75]];
      for (const [name, frac] of labelData) {
        const t = frac * Math.PI * 2;
        g.add(makeLabel(name, new THREE.Vector3(4.5 * Math.cos(t), BASE_Y, 3.3 * Math.sin(t)), '#8250df', 0.95));
      }
      // Animated transport spheres
      const constSphere = makeSphere(new THREE.Vector3(3.5, BASE_Y, 0), 0.12, 0x58a6ff);
      const laborSphere = makeSphere(new THREE.Vector3(3.5, BASE_Y, 0), 0.12, 0xffa657);
      g.add(constSphere);
      g.add(laborSphere);
      this.stageData.constSphere = constSphere;
      this.stageData.laborSphere = laborSphere;
      this.stageData.surplus = SURPLUS;

    update(t) {

      const x = 3.5 * Math.cos(angle);
      const z = 2.5 * Math.sin(angle);
      d.constSphere.position.set(x, d.baseY, z);
      let ly = d.baseY;
      if (frac > 0.4 && frac < 0.6) {
        ly = d.baseY + d.surplus * smoothstep((frac - 0.4) / 0.2);
      } else if (frac >= 0.6) {
        ly = d.baseY + d.surplus;
      }
      d.laborSphere.position.set(x, ly, z);
    }
  },

  // ─── STAGE 7: UNIFIED OBSTRUCTION — HOLONOMY UNROLLS ONTO THE VALUE LINE ───
  {
    id: 'obstruction',
    title: 'The Capital-Obstruction Theorem',
    text: `The holonomy loop unrolls onto the value line <span class="math">T</span>. Production is a <strong>wormhole</strong>: it lifts the circuit out of the plane, adding a dimension. By <em>Stokes' theorem</em>, the line integral around the boundary (what the capitalist measures as <span class="math">\u03B4</span>) equals the surface integral over the production dome (where surplus is created).
    <table class="cohom-table">
      <tr><th>Dim</th><th>Obstruction</th><th>Capital form</th><th>Geometry</th></tr>
      <tr><td><span class="math">H\u2070</span></td><td>Price deviation</td><td>None (arbitrage)</td><td>Sections agree on overlaps</td></tr>
      <tr><td><span class="math">H\u00B9</span></td><td>Circulation gaps</td><td>Merchant / usury</td><td>Walls between charts</td></tr>
      <tr><td><span class="math">H\u00B2</span></td><td>Surplus value</td><td>Industrial</td><td>Curvature over production dome</td></tr>
    </table>
    <em>Orbit the scene</em>: from above, the circuit appears to close (the capitalist's mystified view). From the side, the gap <span class="math">\u03B4</span> is visible. The dome is the source of curvature.`,
    cam: { pos: [7, 5.5, 9], target: [0, 2.5, 0] },
    stageData: {},
    setup(g) {
      const SURPLUS = 1.5;
      const BASE_Y = 2;
      const N = 120;
      const d = this.stageData;
      d.group = g;
      d.BASE_Y = BASE_Y;
      d.SURPLUS = SURPLUS;
      d.N = N;
      d.phase2Done = false;
      d.phase3Done = false;

      // ── Pre-compute loop points (stage 6 geometry) ──
      d.loopConst = [];
      d.loopLabor = [];
      for (let i = 0; i <= N; i++) {
        const frac = i / N;
        const angle = frac * Math.PI * 2;
        const x = 3.5 * Math.cos(angle);
        const z = 2.5 * Math.sin(angle);
        d.loopConst.push(new THREE.Vector3(x, BASE_Y, z));
        let y = BASE_Y;
        if (frac > 0.4 && frac < 0.6) {
          y = BASE_Y + SURPLUS * smoothstep((frac - 0.4) / 0.2);
        } else if (frac >= 0.6) {
          y = BASE_Y + SURPLUS;
        }
        d.loopLabor.push(new THREE.Vector3(x, y, z));
      }

      // ── Pre-compute unrolled points ──
      d.unrollConst = [];
      d.unrollLabor = [];
      for (let i = 0; i <= N; i++) {
        const frac = i / N;
        const x = lerp(-7, 7, frac);
        // Dome: production portion lifts out of the plane in z
        let z = 0;
        if (frac >= 0.3 && frac <= 0.7) {
          const domeFrac = (frac - 0.3) / 0.4;
          z = 3.0 * Math.sin(Math.PI * domeFrac);
        }
        d.unrollConst.push(new THREE.Vector3(x, BASE_Y, z));
        let y = BASE_Y;
        if (frac > 0.4 && frac < 0.6) {
          y = BASE_Y + SURPLUS * smoothstep((frac - 0.4) / 0.2);
        } else if (frac >= 0.6) {
          y = BASE_Y + SURPLUS;
        }
        d.unrollLabor.push(new THREE.Vector3(x, y, z));
      }

      // ── Phase 1: 3D holonomy loop (same as stage 6) ──
      // Constant capital tube (flat, closed)
      d.constTube = makeTube(d.loopConst, 0.035, 0x58a6ff, 0.6);
      g.add(d.constTube);
      // Labor power tube (open, rises)
      d.laborTube = makeTube(d.loopLabor, 0.045, 0xffa657);
      g.add(d.laborTube);
      d.laborGlow = makeTube(d.loopLabor, 0.13, 0xffa657, 0.12);
      g.add(d.laborGlow);

      // Production disk
      const diskGeo = new THREE.CircleGeometry(2.8, 64);
      const diskMat = new THREE.MeshBasicMaterial({ color: 0xffa657, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
      d.disk = new THREE.Mesh(diskGeo, diskMat);
      d.disk.rotation.x = -Math.PI / 2;
      d.disk.position.y = BASE_Y;
      d.disk.scale.set(1.25, 0.9, 1);
      g.add(d.disk);

      // M/M' dots
      d.mDotLoopPos = new THREE.Vector3(3.5, BASE_Y, 0);
      d.mPrimeDotLoopPos = new THREE.Vector3(3.5, BASE_Y + SURPLUS, 0);
      d.mDotUnrollPos = new THREE.Vector3(7, BASE_Y, 0);
      d.mPrimeDotUnrollPos = new THREE.Vector3(7, BASE_Y + SURPLUS, 0);
      d.mDot = makeSphere(d.mDotLoopPos.clone(), 0.12, 0x58a6ff);
      d.mPrimeDot = makeSphere(d.mPrimeDotLoopPos.clone(), 0.12, 0xffa657);
      g.add(d.mDot);
      g.add(d.mPrimeDot);

      // Gap arrow + label
      d.gapArrow = makeTube([
        new THREE.Vector3(3.8, BASE_Y, 0),
        new THREE.Vector3(3.8, BASE_Y + SURPLUS, 0)
      ], 0.03, 0xf85149);
      g.add(d.gapArrow);
      d.deltaLabel = makeLabel('\u03B4 = t\u209B', new THREE.Vector3(5.0, BASE_Y + SURPLUS / 2, 0), '#cf222e', 0.8);
      g.add(d.deltaLabel);
      d.mLabel = makeLabel('M', new THREE.Vector3(4.3, BASE_Y - 0.4, 0), '#0969da', 0.8);
      d.mPrimeLabel = makeLabel("M'", new THREE.Vector3(4.3, BASE_Y + SURPLUS + 0.4, 0), '#9a6700', 0.8);
      g.add(d.mLabel);
      g.add(d.mPrimeLabel);

      // C, P, C' labels (loop positions)
      d.labelCLoopPos = new THREE.Vector3(4.5 * Math.cos(0.25 * Math.PI * 2), BASE_Y, 3.3 * Math.sin(0.25 * Math.PI * 2));
      d.labelPLoopPos = new THREE.Vector3(4.5 * Math.cos(0.5 * Math.PI * 2), BASE_Y, 3.3 * Math.sin(0.5 * Math.PI * 2));
      d.labelCPrimeLoopPos = new THREE.Vector3(4.5 * Math.cos(0.75 * Math.PI * 2), BASE_Y, 3.3 * Math.sin(0.75 * Math.PI * 2));
      // Unrolled positions
      d.labelCUnrollPos = new THREE.Vector3(-3.5, BASE_Y - 0.8, 0);

      g.add(d.labelP);

      const leg2 = makeLabel('\u2113 labor power (curved)', new THREE.Vector3(-4.5, 4.2, 0), '#9a6700', 0.7);

      d.laborSphere = makeSphere(new THREE.Vector3(3.5, BASE_Y, 0), 0.12, 0xffa657);
      g.add(d.constSphere);
      g.add(d.laborSphere);

      // ── Phase 2-3 objects (created hidden, faded in later) ──
      // Dome arc (tube tracing the dome curve)
      const domeArcPts = [];
      const DOME_SEGS = 40;
      for (let i = 0; i <= DOME_SEGS; i++) {
        const frac = 0.3 + 0.4 * (i / DOME_SEGS);
        const x = lerp(-7, 7, frac);
        const domeFrac = (frac - 0.3) / 0.4;
        const z = 3.0 * Math.sin(Math.PI * domeFrac);
        domeArcPts.push(new THREE.Vector3(x, BASE_Y, z));
      }
      d.domeArc = makeTube(domeArcPts, 0.04, 0xffa657, 0);
      g.add(d.domeArc);

      // Dome fill (translucent surface between base and arc)
      const domeFillVerts = [];
      for (let i = 0; i <= DOME_SEGS; i++) {
        const frac = 0.3 + 0.4 * (i / DOME_SEGS);
        const x = lerp(-7, 7, frac);
        const domeFrac = (frac - 0.3) / 0.4;
        const z = 3.0 * Math.sin(Math.PI * domeFrac);
        // Two vertices per segment: base and arc
        domeFillVerts.push(x, BASE_Y, 0);
        domeFillVerts.push(x, BASE_Y, z);
      }
      const domeFillGeo = new THREE.BufferGeometry();
      domeFillGeo.setAttribute('position', new THREE.Float32BufferAttribute(domeFillVerts, 3));
      const domeFillIndices = [];
      for (let i = 0; i < DOME_SEGS; i++) {
        const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, dd = (i + 1) * 2 + 1;
        domeFillIndices.push(a, b, c);
        domeFillIndices.push(b, dd, c);
      }
      domeFillGeo.setIndex(domeFillIndices);
      domeFillGeo.computeVertexNormals();
      d.domeFill = new THREE.Mesh(domeFillGeo, new THREE.MeshBasicMaterial({
        color: 0xffa657, transparent: true, opacity: 0, side: THREE.DoubleSide
      }));
      g.add(d.domeFill);

      // Base line T (phase 3)
      d.baseLine = makeTube([new THREE.Vector3(-8, 0, 0), new THREE.Vector3(8, 0, 0)], 0.04, 0x58a6ff, 0);
      g.add(d.baseLine);

      // CC segments on base line (phase 3)
      d.ccSegments = [];
      const ccDefs = [
        { color: 0x58a6ff, x1: -7, x2: -1 },
        { color: 0x3fb950, x1: -3, x2: 4 },
        { color: 0xbc8cff, x1: 2, x2: 7 },
      ];
      for (const cc of ccDefs) {
        const seg = makeTube([
          new THREE.Vector3(cc.x1, 0, 0), new THREE.Vector3(cc.x2, 0, 0)
        ], 0.07, cc.color, 0);
        g.add(seg);
        d.ccSegments.push(seg);
      }

      // Walls at CC boundaries (phase 3)
      d.walls = [];
      for (const wx of [-2, 3]) {
        const wallGeo = new THREE.PlaneGeometry(0.06, 4.5);
        const wallMat = new THREE.MeshBasicMaterial({ color: 0xf85149, transparent: true, opacity: 0, side: THREE.DoubleSide });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(wx, 2.25, 0);
        g.add(wall);
        d.walls.push(wall);
      }

      // Cohomology labels (phase 3)
      d.cohomLabels = [];
      const h0 = makeLabel('H\u2070=0', new THREE.Vector3(-5, 4.8, 0), '#1a7f37', 0.8);
      h0.material.opacity = 0;
      g.add(h0);
      d.cohomLabels.push(h0);

      const h1a = makeLabel('H\u00B9\u22600', new THREE.Vector3(-2, 4.8, 0), '#cf222e', 0.8);
      h1a.material.opacity = 0;
      g.add(h1a);
      d.cohomLabels.push(h1a);

      const h1b = makeLabel('H\u00B9\u22600', new THREE.Vector3(3, 4.8, 0), '#cf222e', 0.8);
      h1b.material.opacity = 0;
      g.add(h1b);
      d.cohomLabels.push(h1b);

      const h2 = makeLabel('H\u00B2\u22600', new THREE.Vector3(0, BASE_Y + 1.2, 3.5), '#9a6700', 0.95);
      h2.material.opacity = 0;
      g.add(h2);
      d.cohomLabels.push(h2);

      // Stokes label (phase 3)
      d.stokesLabel = makeLabel('\u222E = \u222C (Stokes)', new THREE.Vector3(0, -0.8, 0), '#57606a', 0.8);
      d.stokesLabel.material.opacity = 0;
      g.add(d.stokesLabel);

      // CC subscript labels (phase 3)
      d.ccLabels = [];
      const cc1L = makeLabel('CC\u2081', new THREE.Vector3(-4, -0.7, 0), '#58a6ff', 0.7);
      cc1L.material.opacity = 0; g.add(cc1L); d.ccLabels.push(cc1L);
      const cc2L = makeLabel('CC\u2082', new THREE.Vector3(0.5, -0.7, 0), '#3fb950', 0.7);
      cc2L.material.opacity = 0; g.add(cc2L); d.ccLabels.push(cc2L);
      const cc3L = makeLabel('CC\u2083', new THREE.Vector3(4.5, -0.7, 0), '#bc8cff', 0.7);
      cc3L.material.opacity = 0; g.add(cc3L); d.ccLabels.push(cc3L);

      // Track current interpolation parameter for tube rebuilds
      d.lastBlend = -1;
    },

    update(t) {
      const d = this.stageData;
      if (!d.constSphere) return;
      const N = d.N;
      const BASE_Y = d.BASE_Y;
      const SURPLUS = d.SURPLUS;

      // ── Determine animation phase ──
      // Phase 1: 0-3s (loop), Phase 2: 3-6.5s (unroll), Phase 3: >7s (decorations)
      let blend = 0; // 0 = loop, 1 = unrolled
      if (t >= 3 && t < 6.5) {
        blend = smoothstep(Math.min((t - 3) / 3.5, 1));
      } else if (t >= 6.5) {
        blend = 1;
      }

      // ── Rebuild tube geometries when blend changes significantly ──
      if (Math.abs(blend - d.lastBlend) > 0.015 || (blend === 1 && d.lastBlend !== 1) || (blend === 0 && d.lastBlend !== 0)) {
        d.lastBlend = blend;

        // Interpolate points
        const interpConst = [];
        const interpLabor = [];
        for (let i = 0; i <= N; i++) {
          interpConst.push(new THREE.Vector3(
            lerp(d.loopConst[i].x, d.unrollConst[i].x, blend),
            lerp(d.loopConst[i].y, d.unrollConst[i].y, blend),
            lerp(d.loopConst[i].z, d.unrollConst[i].z, blend)
          ));
          interpLabor.push(new THREE.Vector3(
            lerp(d.loopLabor[i].x, d.unrollLabor[i].x, blend),
            lerp(d.loopLabor[i].y, d.unrollLabor[i].y, blend),
            lerp(d.loopLabor[i].z, d.unrollLabor[i].z, blend)
          ));
        }

        // Dispose and rebuild constant capital tube
        if (d.constTube.geometry) d.constTube.geometry.dispose();
        const constCurve = new THREE.CatmullRomCurve3(interpConst);
        d.constTube.geometry = new THREE.TubeGeometry(constCurve, 480, 0.035, 8, false);

        // Dispose and rebuild labor tube + glow
        if (d.laborTube.geometry) d.laborTube.geometry.dispose();
        if (d.laborGlow.geometry) d.laborGlow.geometry.dispose();
        const laborCurve = new THREE.CatmullRomCurve3(interpLabor);
        d.laborTube.geometry = new THREE.TubeGeometry(laborCurve, 480, 0.045, 8, false);
        d.laborGlow.geometry = new THREE.TubeGeometry(laborCurve, 480, 0.13, 8, false);
      }

      // ── Animate transport spheres ──
      const speed = 0.15;
      const frac = (t * speed) % 1;
      const idx = Math.min(Math.floor(frac * N), N - 1);
      const subFrac = (frac * N) - idx;
      // Interpolate between loop and unrolled for current frac
      const cx = lerp(
        lerp(d.loopConst[idx].x, d.loopConst[Math.min(idx + 1, N)].x, subFrac),
        lerp(d.unrollConst[idx].x, d.unrollConst[Math.min(idx + 1, N)].x, subFrac),
        blend
      );
      const cy_c = lerp(
        lerp(d.loopConst[idx].y, d.loopConst[Math.min(idx + 1, N)].y, subFrac),
        lerp(d.unrollConst[idx].y, d.unrollConst[Math.min(idx + 1, N)].y, subFrac),
        blend
      );
      const cz = lerp(
        lerp(d.loopConst[idx].z, d.loopConst[Math.min(idx + 1, N)].z, subFrac),
        lerp(d.unrollConst[idx].z, d.unrollConst[Math.min(idx + 1, N)].z, subFrac),
        blend
      );
      d.constSphere.position.set(cx, cy_c, cz);

      const lx = lerp(
        lerp(d.loopLabor[idx].x, d.loopLabor[Math.min(idx + 1, N)].x, subFrac),
        lerp(d.unrollLabor[idx].x, d.unrollLabor[Math.min(idx + 1, N)].x, subFrac),
        blend
      );
      const ly = lerp(
        lerp(d.loopLabor[idx].y, d.loopLabor[Math.min(idx + 1, N)].y, subFrac),
        lerp(d.unrollLabor[idx].y, d.unrollLabor[Math.min(idx + 1, N)].y, subFrac),
        blend
      );
      const lz = lerp(
        lerp(d.loopLabor[idx].z, d.loopLabor[Math.min(idx + 1, N)].z, subFrac),
        lerp(d.unrollLabor[idx].z, d.unrollLabor[Math.min(idx + 1, N)].z, subFrac),
        blend
      );
      d.laborSphere.position.set(lx, ly, lz);

      // ── Interpolate M/M' positions ──
      d.mDot.position.lerpVectors(d.mDotLoopPos, d.mDotUnrollPos, blend);
      d.mPrimeDot.position.lerpVectors(d.mPrimeDotLoopPos, d.mPrimeDotUnrollPos, blend);

      // Gap arrow: rebuild at interpolated position
      const gapX = lerp(3.8, 7.4, blend);
      d.gapArrow.position.x = gapX - 3.8; // offset from initial
      d.deltaLabel.position.set(lerp(5.0, 8.2, blend), BASE_Y + SURPLUS / 2, 0);
      d.mLabel.position.set(lerp(4.3, 7.8, blend), BASE_Y - 0.4, 0);
      d.mPrimeLabel.position.set(lerp(4.3, 7.8, blend), BASE_Y + SURPLUS + 0.4, 0);

      // ── Interpolate C, P, C' labels ──
      d.labelC.position.lerpVectors(d.labelCLoopPos, d.labelCUnrollPos, blend);
      d.labelP.position.lerpVectors(d.labelPLoopPos, d.labelPUnrollPos, blend);
      d.labelCPrime.position.lerpVectors(d.labelCPrimeLoopPos, d.labelCPrimeUnrollPos, blend);

      // ── Phase 2: fade transitions ──
      if (t >= 3 && t < 6.5) {
        const fadeProgress = Math.min((t - 3) / 3.5, 1);
        // Fade out production disk
        d.disk.material.opacity = 0.06 * (1 - fadeProgress);
        // Fade in dome arc + fill
        d.domeArc.material.opacity = fadeProgress * 0.8;
        d.domeFill.material.opacity = fadeProgress * 0.12;
        // Fade out legend labels
        for (const lbl of d.legendLabels) {
          lbl.material.opacity = 1 - fadeProgress;
        }
      } else if (t >= 6.5 && !d.phase2Done) {
        d.phase2Done = true;
        d.disk.material.opacity = 0;
        d.domeArc.material.opacity = 0.8;
        d.domeFill.material.opacity = 0.12;
        for (const lbl of d.legendLabels) lbl.material.opacity = 0;
      }

      // ── Camera transition for Phase 2 ──
      if (t >= 3 && t < 6.5) {
        const camProgress = smoothstep(Math.min((t - 3) / 3.5, 1));
        targetCamPos.set(
          lerp(7, 2, camProgress),
          lerp(5.5, 4, camProgress),
          lerp(9, 14, camProgress)
        );
        targetCamTarget.set(
          lerp(0, 0, camProgress),
          lerp(2.5, 2, camProgress),
          lerp(0, 1, camProgress)
        );
        camLerpActive = true;
      }

      // ── Phase 3: decorations fade in (t > 7s, over 2s) ──
      if (t >= 7 && !d.phase3Done) {
        const fadeIn = Math.min((t - 7) / 2, 1);
        // Base line
        d.baseLine.material.opacity = fadeIn * 0.5;
        // CC segments
        for (const seg of d.ccSegments) seg.material.opacity = fadeIn * 0.6;
        // Walls
        for (const wall of d.walls) wall.material.opacity = fadeIn * 0.35;
        // Cohomology labels
        for (const lbl of d.cohomLabels) lbl.material.opacity = fadeIn;
        // Stokes label
        d.stokesLabel.material.opacity = fadeIn * 0.8;
        // CC labels
        for (const lbl of d.ccLabels) lbl.material.opacity = fadeIn * 0.7;

        if (fadeIn >= 1) d.phase3Done = true;
      }
    }
  }
];



// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
let currentStage = -1;
let stageTime = 0;
const badge = document.getElementById('stage-badge');
const title = document.getElementById('stage-title');
const text = document.getElementById('stage-text');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

function goToStage(idx) {
  if (idx < 0 || idx >= STAGES.length) return;

  // Teardown previous stage if it has cleanup
  if (currentStage >= 0 && STAGES[currentStage] && STAGES[currentStage].teardown) {
    STAGES[currentStage].teardown();
  }

  currentStage = idx;
  stageTime = 0;
  const s = STAGES[idx];

  // Update sidebar
  badge.textContent = `Stage ${idx + 1} of ${STAGES.length}`;
  title.textContent = s.title;
  text.innerHTML = s.text;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === STAGES.length - 1;

  // Clear stage group
  while (stageGroup.children.length) {
    const c = stageGroup.children[0];
    stageGroup.remove(c);
    disposeObject(c);
  }

  // Hide persistent grid for plane-based stages (0-3)
  gridHelper.visible = (idx >= 4);

  // Setup new stage
  s.setup(stageGroup);

  // Camera target
  targetCamPos.set(...s.cam.pos);
  targetCamTarget.set(...s.cam.target);
  camLerpActive = true;
}

function disposeObject(obj) {
  if (obj.geometry) obj.geometry.dispose();
  if (obj.material) {
    if (obj.material.map) obj.material.map.dispose();
    obj.material.dispose();
  }
  if (obj.children) obj.children.forEach(disposeObject);
}

btnPrev.addEventListener('click', () => goToStage(currentStage - 1));
btnNext.addEventListener('click', () => goToStage(currentStage + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToStage(currentStage + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToStage(currentStage - 1);
});

// Start
goToStage(0);

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  stageTime += dt;

  // Smooth camera — only lerp during transitions, then let user orbit freely
  if (camLerpActive) {
    camera.position.lerp(targetCamPos, camLerp);
    controls.target.lerp(targetCamTarget, camLerp);
    if (camera.position.distanceTo(targetCamPos) < 0.05 &&
        controls.target.distanceTo(targetCamTarget) < 0.05) {
      camLerpActive = false;
    }
  }
  controls.update();

  // Stage-specific updates
  const s = STAGES[currentStage];
  if (s && s.update) s.update(stageTime);

  renderer.render(scene, camera);
}
animate();

</script>
